id: 0x018
name: 'CRASH_INFO'
alt_names: ['ETAT_INFO_CRASH']
length: 5
comment:
  en: 'Contains crash information'
  fr: 'Contient des informations relatives aux crashs'
type: 'can'
periodicity: ['200ms', 'trigger']
senders:
  - 'PASS_BSI'
receivers:
  - 'BTEL'
  - 'PLC'
  - 'PDPC'
  - 'MDS'

signals:
  PASSENGER_AIRBAG_INHIBITION_STATUS:
    alt_names: ['ET_INHIBITION']
    bits: "1.7"
    comment:
      fr: "Etat de l'inhibition réelle de l'airbag passager"
      en: "Actual inhibition status of the passenger airbag"
    values:
      0x00:
        fr: "Air bag passager inhibé"
        en: "Passenger airbag inhibited"
      0x01:
        fr: "Air bag passager activé"
        en: "Passenger airbag activated"

  POSSIBLE_FRONTAL_CRASH:
    alt_names: ['FRONT_REPAR']
    bits: "1.6"
    comment:
      fr: "Info Crash frontal réparabilité"
      en: "Possibility of repairing frontal Info Crash"
    values:
      0x00:
        fr: "Crash non détecté"
        en: "Crash not detected"
      0x01:
        fr: "Crash détecté"
        en: "Crash detected"

  LOW_SPEED_FRONTAL_CRASH:
