id: 0x325
name: 'RADIO_STATUS_CD_GEN'
alt_names: ['ETAT_RADIO_CD_CD']
length: 3
comment:
  en: 'General CD player (internal) informations'
  fr: 'Informations generales du lecteur de CD interne'
type: 'can'
periodicity: '500ms'
senders:
  - RAD
  - PASS_ICSV
receivers:
  - 'EMF'
  - 'CMB_EMF'
  - 'MATT'
  - 'PASS_ICSV'

signals:
  LIST_CD:
    bits: '1.7'
    alt_names: ['LISTE_CD_MP3']
    comment:
      en: 'List available tracks'
      fr: 'Liste les pistes disponibles'
    values:
      0x00:
        en: 'Not requested'
        fr: 'Non demandé'
      0x01:
        en: 'Requested'
        fr: 'Demandé'

  UNUSED_1:
    bits: '1.6-1.5'
    unused: true

  MODE_CD:
    bits: '1.4'
    alt_names: ['MODE_CD']
    comment:
      en: 'Track/CD mode'
      fr: 'Mode Track/CD'
    values:
      0x00:
        en: 'Mode CD'
        fr: 'Mode CD'
      0x01:
        en: 'Mode Track'
        fr: 'Mode Track'

  REPEAT:
    bits: '1.3-1.2'
    alt_names: ['REP_CD']
    values:
      0x00:
        en: 'No repeat'
        fr: 'Pas de repetition'
      0x01:
        en: 'Track repeat'
        fr: 'Repetition morceau'
      0x02:
        en: 'Disk repeat'
        fr: 'Repetition disque'

  CD_PLAY_STATUS:
    bits: '1.1-1.0'
    alt_names: ['LECT_CD']
    comment:
      en: 'CD player status'
      fr: 'Etat du lecteur CD'
    values:
      0x00:
        en: 'Normal'
        fr: 'Normal'
      0x01:
        en: 'Random play'
        fr: 'Lecture aléatoire des plages'

  RANDOM:
    bits: '1.0'
    values:
      0x00:
        en: 'No random'
        fr: 'Lecture non aleatoire'
      0x01:
        en: 'Random'
        fr: 'Lecture aleatoire'

  ACCESS_CD:
    bits: '2.7'
    alt_names: ['ACCES_CD']
    comment:
      en: 'CD access in progress'
      fr: 'Accès CD en cours'
    values:
      0x00:
        en: 'No access'
        fr: 'Pas d''accès'
      0x01:
        en: 'Accessing CD'
        fr: 'Accès CD'

  UNUSED_2:
    bits: '2.6'
    unused: true

  DISK_DIRECTION:
    bits: '2.5'
    alt_names: ['ERR_DSK_CD']
    values:
      0x00:
        fr: 'Disque à l''endroit'
        en: 'Disk is right side up'
      0x01:
        en: 'Disk upside down'
        fr: 'Disque dans le mauvais sens'

  DISC_ERROR:
    bits: '2.4'
    alt_names: ['DISK_ILLISIBLE']
    comment:
      en: 'CD error'
      fr: 'Erreur CD'
    values:
      0x00:
        en: 'No error'
        fr: 'Pas d''erreur'
      0x01:
        en: 'Read error'
        fr: 'Erreur de lecture'

  TEXT_AVAILABLE:
    bits: '2.3'
    alt_names: ['LISTE_CD_OK']
    comment:
      en: 'CD text available'
      fr: 'Texte CD disponible'
    values:
      0x00:
        en: 'Text not available'
        fr: 'Texte non disponible'
      0x01:
        en: 'Text available'
        fr: 'Texte disponible'

  STATUS:
    bits: '2.2-2.0'
    alt_names: ['STA_CD']
    comment:
      en: 'CD player status'
      fr: 'Etat du lecteur CD'
    values:
      0x00:
        en: 'No disk'
        fr: 'Pas de disque'
      0x01:
        en: 'Stopped'
        fr: 'Arrete'
      0x02:
        en: 'Pause'
        fr: 'Pause'
      0x03:
        en: 'Play'
        fr: 'Lecture'
      0x04:
        en: 'Fast-forward'
        fr: 'Avance rapide'
      0x05:
        en: 'Fast-backward'
        fr: 'Retour rapide'
      0x06:
        en: 'Intro'
        fr: 'Intro'

  CD_OVERHEATING:
    bits: '3.7'
    alt_names: ['TEMP_CD']
    comment:
      en: 'CD player overheating'
      fr: 'Surchauffe lecteur CD'
    values:
      0x00:
        en: 'Normal temperature'
        fr: 'Température normale'
      0x01:
        en: 'Overheating'
        fr: 'Surchauffe'

  CD_PLAYER_ERROR:
    bits: '3.6'
    alt_names: ['ERROR_CD']
    comment:
      en: 'CD player error'
      fr: 'Erreur lecteur CD'
    values:
      0x00:
        en: 'No error'
        fr: 'Pas d''erreur'
      0x01:
        en: 'Error'
        fr: 'Erreur'

UNUSED_3:
    bits: '3.5-3.0'
    unused: true