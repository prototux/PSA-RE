id: 0x161
name: 'BSI_GAUGES'
alt_names: ['ETAT_BSI_TEMP_NIVEAU']
length: 7
type: 'can'
periodicity: '500ms'
senders:
  - 'BSI'
receivers:
  - 'CMB'
  - 'BTEL'
  - 'BCD'
  - 'CMB_EMF'
  - 'MDS'
  - 'RNEG'
  - 'MATT'
  - 'BGP'

signals:
  OIL_LEVEL_RESTART:
    bits: '1.7'
    alt_names: ['RELANCE_NIV_HUILE']
    comment:
      en: 'Oil level restart'
      fr: 'Relance niveau huile moteur'
    values:
      0x00:
        en: 'No restart'
        fr: 'Pas de relance'
      0x01:
        en: 'Restart'
        fr: 'Relance'

  UNUSED_1:
    bits: '1.6-2.0'
    unused: true

  OIL_TEMPERATURE:
    bits: '3.7-3.0'
    alt_names: ['T_HUILE']
    comment:
      en: 'Oil temperature'
      fr: 'Temperature huile moteur'
    type: 'uint8'
    offset: -40
    min: -40
    max: 214
    resolution: 1
    invalid: 0xFF
    units: 'C'

  FUEL_LEVEL:
    bits: '4.7-4.0'
    alt_names: ['NIV_CRB']
    comment:
      en: 'Fuel level'
      fr: 'Niveau carburant'
    type: 'uint8'
    offset: 0
    min: 0
    max: 100
    resolution: 1
    invalid: 0xFF
    units: '%'

  UNUSED_2:
    bits: '5.7-6.0'
    unused: true

  OIL_LEVEL:
    bits: '7.7-7.0'
    alt_names: ['NIV_HUILE']
    comment:
      en: 'Oil level'
      fr: 'Niveau huile moteur'
    type: 'uint8'
    offset: 0
    min: 0
    max: 250
    resolution: 1
    invalid: 0xFF
    units: '%'

