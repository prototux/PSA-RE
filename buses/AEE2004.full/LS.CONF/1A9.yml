id: 0x1A9
name: 'TELEMATICS_STATUS'
alt_names: ['DEMANDES_BTEL']
length: 1
comment:
  en: 'Telematics status'
  fr: 'Statut télématique'
type: 'can'
periodicity: ['200ms', 'trigger']
senders:
  - 'BTEL'
  - 'NG4'
  - 'RNEG'
receivers:
  - 'BSI'

signals:
  BLACK_PANEL_STATUS:
    alt_names: ['ETAT_BP_DARK']
    bits: "1.7"
    comment:
      fr: "Etat de la fonction Black Panel associée au push Dark"
      en: "Status of Black Panel function associated with Dark push"
    values:
      0:
        fr: "Fonction inactivée"
        en: "Function disabled"
      1:
        fr: "Fonction activée"
        en: "Function enabled"

  EMERGENCY_CALL_STATUS:
    alt_names: ['APP_URG']
    bits: "1.6"
    comment:
      fr: "Appel d'urgence en cours"
      en: "Emergency call in progress"
    values:
      0:
        fr: "Pas d'appel d'urgence"
        en: "No emergency call"
      1:
        fr: "Appel d'urgence en cours"
        en: "Emergency call in progress"

  TELEMATICS_FUNCTIONS_STATUS:
    alt_names: ['S_FCT_TELE']
    bits: "1.5"
    comment:
      fr: "Etat des fonctions télématiques."
      en: "Telematic functions state."
    values:
      0:
        fr: "Aucune fonction télématique activée"
        en: "No telematic function active"
      1:
        fr: "Au moins une fonction télématique activée"
        en: "At least one telematic function active"

  UNUSED_1:
    alt_names: ['LIBRE_1']
    bits: "1.4-1.0"
    unused: true