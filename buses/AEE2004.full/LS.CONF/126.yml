id: 0x126
name: 'PARKING_AID_COMMAND'
alt_names: ['COMMANDE_AAS']
length: 3
type: 'can'
periodicity: ['100ms', 'trigger']
senders:
  - 'BSI'
receivers:
  - 'AAS'

signals:
  LIBRE_3:
    bits: '1.7-1.5'
    alt_names: ['LIBRE_3']
    unused: true

  DMD_INHIB_SON:
    bits: '1.4'
    alt_names: ['DMD_INHIB_SON']
    comment:
      fr: 'Demande d''inhibition sonore AAS'
      en: 'Request for AAS sound inhibition'
    values:
      0x00:
        fr: 'Pas d''inhibition'
        en: 'No inhibition'
      0x01:
        fr: 'Inhibition'
        en: 'Inhibition'

  DMD_INHIB_VISUEL:
    bits: '1.3'
    alt_names: ['DMD_INHIB_VISUEL']
    comment:
      fr: 'Demande d''inhibition visuelle AAS'
      en: 'Request for AAS visual inhibition'
    values:
      0x00:
        fr: 'Pas d''inhibition'
        en: 'No inhibition'
      0x01:
        fr: 'Inhibition'
        en: 'Inhibition'

  PRESENCE_RQUE:
    bits: '1.2'
    alt_names: ['PRESENCE_RQUE']
    comment:
      fr: 'Présence d''une remorque (si cette info est dispo dans la BSI)'
      en: 'Presence of a trailer (if this info is available in the BSI)'
    values:
      0x00:
        fr: 'Pas de remorque'
        en: 'No trailer'
      0x01:
        fr: 'Remorque présente'
        en: 'Trailer present'

  PRESENCE_CROCHET:
    bits: '1.1'
    alt_names: ['PRESENCE_CROCHET']
    comment:
      fr: 'Présence crochet (info dispo dans BSI ou équivalent à présence BSR par défaut)'
      en: 'Presence of hook (info available in the BSI or equivalent to the presence of BSR by default)'
    values:
      0x00:
        fr: 'Pas de crochet'
        en: 'No hook'
      0x01:
        fr: 'Crochet présent'
        en: 'Hook present'

  DMD_ACTIV_MPD:
    bits: '1.0'
    alt_names: ['DMD_ACTIV_MPD']
    comment:
      fr: 'Demande d''activation de la fonction MPD (Mesure de place dispo)'
      en: 'Request for MPD function activation (Measurement of available space)'
    values:
      0x00:
        fr: 'Inactif'
        en: 'Inactive'
      0x01:
        fr: 'Actif'
        en: 'Active'

  RAP_AFF_CMB:
    bits: '2.7-2.4'
    alt_names: ['RAP_AFF_CMB']
    comment:
      fr: 'Rapport à afficher au combiné'
      en: 'Report to display to the handset'
    values:
      0x00:
        fr: '"P"'
        en: '"P"'
      0x01:
        fr: '"R"'
        en: '"R"'
      0x02:
        fr: '"N"'
        en: '"N"'
      0x03:
        fr: '"D"'
        en: '"D"'
      0x04:
        fr: '6e vitesse'
        en: 'Gear 6'
      0x05:
        fr: '5e vitesse'
        en: 'Gear 5'
      0x06:
        fr: '4e vitesse'
        en: 'Gear 4'
      0x07:
        fr: '3e vitesse'
        en: 'Gear 3'
      0x08:
        fr: '2e vitesse'
        en: 'Gear 2'
      0x09:
        fr: '1e vitesse'
        en: 'Gear 1'
      0x0A:
        fr: 'Invalide'
        en: 'Invalid'
      0x0B:
        fr: 'Aucun rapport à afficher'
        en: 'No gear to display'
      0x0C:
        fr: '7e vitesse'
        en: 'Gear 7'
      0x0D:
        fr: 'Invalide'
        en: 'Invalid'
      0x0E:
        fr: 'Invalide'
        en: 'Invalid'
      0x0F:
        fr: 'Invalide'
        en: 'Invalid'

  LIBRE_4_1:
    bits: '2.3-2.0'
    alt_names: ['LIBRE_4']
