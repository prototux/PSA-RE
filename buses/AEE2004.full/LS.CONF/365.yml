id: 0x365
name: 'RADIO_STATUS_CD_DISK'
alt_names: ['ETAT_RADIO_CD_DSK']
length: 5
comment:
  en: 'Internal CD disk status'
  fr: 'Etat du disque dans le lecteur CD interne'
type: 'can'
periodicity: ['500ms']
senders:
  - 'RAD'
  - 'PASS_ICSV'
receivers:
  - 'EMF'
  - 'CMB_EMF'
  - 'MATT'
  - 'PASS_ICSV'

signals:
  TRACKS:
    bits: '1.7-1.0'
    alt_names: ['NB_DSK']
    comment:
      en: 'Number of tracks on the disk'
      fr: 'Nombre de pistes sur le CD'
    values:
      0xFF:
        en: 'No disk'
        fr: 'Pas de disque'
    type: 'uint8'
    offset: 0
    min: 0
    max: 254
    resolution: 1
    invalid:  0xFF
    units:

  TOTAL_DURATION_MINUTES:
    bits: '2.7-2.0'
    alt_names: ['MN_DSK']
    comment:
      en: 'Total disk duration, minutes'
      fr: 'Duree totale du disque, minutes'
    values:
      0xFF:
        en: 'No disk'
        fr: 'Pas de disque'
    type: 'uint8'
    offset: 0
    min: 0
    max: 254
    resolution: 1
    invalid:  0xFF
    units:



  TOTAL_DURATION_SECONDS:
    bits: '3.7-3.0'
    alt_names: ['SEC_DSK']
    comment:
      en: 'Total disk duration, seconds'
      fr: 'Duree totale du disque, secondes'
    values:
      0xFF:
        en: 'No disk'
        fr: 'Pas de disque'
    type: 'uint8'
    offset: 0
    min: 0
    max: 254
    resolution: 1
    invalid:  0xFF
    units: 's'

  NUMBER_OF_MP3_DIR:
    bits: '4.7-4.0'
    alt_names: ['NUM_REP_MP3']
    comment:
      en: 'Number of MP3 directories on the disk'
      fr: 'Nombre de répertoires MP3 sur le CD'
    type: 'uint8'
    offset: 0
    min: 0
    max: 254
    resolution: 1
    invalid:  0xFF
    units:

  UNUSED_2:
    bits: '5.7-5.0'
    unused: true
