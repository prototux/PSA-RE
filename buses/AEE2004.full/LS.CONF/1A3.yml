id: 0x1A3
name: 'KML_STATUS'
length: 7
type: 'can'
periodicity: '200ms'
senders:
  - 'KML'
  - 'RAD'
  - 'PASS_ICSV'
receivers:
  - 'BSI'
  - 'EMF'
  - 'RAD'
  - 'CMB_EMF'
  - 'BTT'
  - 'BSI'
  - 'PASS_ICSV'

signals:
  CONNECTED:
    bits: '1.7'
    alt_names: ['CONNECT']
    values:
      0x00:
        en: 'not connected'
        fr: 'non connecte'
      0x01:
        en: 'connected'
        fr: 'connecte'

  CONNECTING:
    bits: '1.6'
    alt_names: ['STATUS_CONNECT']
    values:
      0x00:
        en: 'not connecting'
        fr: 'pas de connection'
      0x01:
        en: 'connecting'
        fr: 'connection en cours'

  TYPE_CONNECTION:
    bits: '1.5'
    alt_names: ['TYPE_CONNECT']
    values:
      0x00:
        en: 'auto connect'
        fr: 'connection auto'
      0x01:
        en: 'manual connection'
        fr: 'connection manuelle'

  CONNECTION_ERROR:
    bits: '1.4'
    alt_names: ['RESULTAT_CONNECT']
    values:
      0x00:
        en: 'no connection error'
        fr: 'sans erreur de connection'
      0x01:
        en: 'connection error'
        fr: 'erreur a la connection'

  HEADSET_STATUS:
    bits: '1.3'
    alt_names: ['MODE_CASQUE']
    values:
      0x00:
        en: 'no headset'
        fr: 'pas de main libres'
      0x01:
        en: 'headset'
        fr: 'mains libres'

  SECRET_MODE:
    bits: '1.2'
    alt_names: ['MODE_SECRET']
    values:
      0x00:
        en: 'Inactive'
        fr: 'Inactif'
      0x01:
        en: 'Active'
        fr: 'Actif'

  AUTO_PICKUP:
    bits: '1.1'
    alt_names: ['DECOCHAGE_AUTO', 'DEC_AUTO']
    values:
      0x00:
        en: 'Auto pickup disabled'
        fr: 'Decrochage auto desactive'
      0x01:
        en: 'Auto pickup enabled'
        fr: 'Decrochage auto active'

  ROAMING_STATUS:
    bits: '1.0'
    alt_names: ['ROAMING']
    values:
      0x00:
        en: 'No roaming'
        fr: 'Pas de roaming'
      0x01:
        en: 'Roaming enabled'
        fr: 'Roaming actif'

  MESSAGES_STATUS:
    bits: '2.7-2.6'
    alt_names: ['SMS']
    values:
      0x00:
        en: 'No messages'
        fr: 'Pas de SMS'
      0x01:
        en: 'Message received'
        fr: 'SMS recu'
      0x02:
        en: 'Message memory full'
        fr: 'Memoire SMS remplie'

  VOICEMAIL_STATUS:
    bits: '2.5'
    alt_names: ['PRES_REP_VOCALE']
    values:
      0x00:
        en: 'No voicemail'
        fr: 'Pas de message vocal'
      0x01:
        en: 'Voicemail'
        fr: 'Message vocal'

  CALL_FORWARDING:
    bits: '2.4'
    alt_names: ['RENVOI_APPEL']
    values:
      0x00:
        en: 'No call forwarding'
        fr: 'Pas de renvoi appel'
      0x01:
        en: 'Call forwarding'
        fr: 'Renvoi appel'

  CHARGING:
    bits: '2.3'
    alt_names: ['BAT_CHARG']
    values:
      0x00:
        en: 'Not charging'
        fr: 'Ne charge pas'
      0x01:
        en: 'Charging'
        fr: 'Chargement'

  MUTED:
    bits: '2.2'
    alt_names: ['MUTE_KML']
    values:
      0x00:
        en: 'Muted'
        fr: 'Silencieux'
      0x01:
        en: 'Not muted'
        fr: 'Silencieux off'

  SWITCHING_SRC:
    bits: '2.1'
    alt_names: ['PASSAGE_SOURCE_TEL']
    values:
      0x00:
        en: 'Not switching'
        fr: 'Pas de bascule'
      0x01:
        en: 'Switching radio to tel'
        fr: 'Bascule de la radio vers tel'

  UNUSED_1:
    bits: '2.0'
    unused: true

  NETWORK_QUALITY:
    bits: '3.7-3.0'
    alt_names: ['QUA_RESEAU']
    type: 'uint8'
    offset: 0
    min: 0
    max: 100
    resolution: 1
    invalid:
    units:

  BATTERY_STATUS_PERCENT:
    bits: '4.7-4.0'
    alt_names: ['NIV_BATTERIE']
    type: 'uint8'
    offset: 0
    min: 0
    max: 100
    resolution: 1
    invalid:
    units:

  CONTACTS_AVAILABLE:
    bits: '5.7-5.6'
    alt_names: ['ACCES_REP_SIMTEL']
    values:
      0x00:
        en: 'Directory not accessible and not activable'
        fr: 'Répertoire non accessible et non activable'
      0x01:
        en: 'Directory not accessible but activable'
        fr: 'Répertoire non accessible et activable'
      0x02:
        en: 'Directory accessible but not activable'
        fr: 'Répertoire accessible et non activable'
      0x03:
        en: 'Directory accessible and activable'
        fr: 'Répertoire accessible et activable'

  CALL_LOG_AVAILABLE:
    bits: '5.5-5.4'
    alt_names: ['ACCES_JOURNAL']
    values:
      0x00:
        fr: 'Répertoire non accessible et non activable'
        en: 'Not accessible and not activable'
      0x01:
        fr: 'Répertoire non accessible et activable'
        en: 'Not accessible but activable'
      0x02:
        fr: 'Répertoire accessible et non activable'
        en: 'Accessible but not activable'
      0x03:
        fr: 'Répertoire accessible et activable'
        en: 'Accessible and activable'

  ACCESS_STATUS:
    bits: '5.3'
    alt_names: ['ACCES_REP_SERVICE']
    values:
      0x00:
        en: 'Unable to access'
        fr: 'Acces impossible'
      0x01:
        en: 'Access unlocked'
        fr: 'Acces deverouille'

  CALL_TYPE:
    bits: '5.2-5.0'
    alt_names: ['APPEL_VOC']
    values:
      0x00:
        en: 'Not calling'
        fr: 'Aucun appel'
      0x01:
        en: 'Unable to reconnect'
        fr: 'Impossible de reconnecter'
      0x05:
        en: 'Calling from shortcut'
        fr: 'Appel depuis raccourci'
      0x06:
        en: 'Calling from voice command'
        fr: 'Appel depuis commande vocale'
      0x07:
        en: 'Voice commande not recognized'
        fr: 'Commande vocale non reconnue'

  LIST_TYPE:
    bits: '6.7-6.4'
    alt_names: ['TYPE_LISTE_CONSTRUCTION']
    values:
      0x00:
        en: 'None'
        fr: 'Aucun'
      0x01:
        en: 'Phone pairing'
        fr: 'Appairage telephone'

  PAIRING_STATUS:
    bits: '6.3'
    alt_names: ['ETAT_FCT_JUM']
    values:
      0x00:
        en: 'Pairing disabled'
        fr: 'Appairage desactive'
      0x01:
        en: 'Pairing enabled'
        fr: 'Appairage active'

  DATA_TRANSFER:
    bits: '6.2-6.1'
    alt_names: ['ETAT_OBJECT_PUSH']
    values:
      0x00:
        en: 'No data transfer'
        fr: 'Aucun transfert'
      0x01:
        en: 'Finished transfer'
        fr: 'Transfert fini'
      0x02:
        en: 'Failed to transfer'
        fr: 'Echec du transfert'

  AUDIO_STREAMING:
    bits: '6.0'
    alt_names: ['FCT_STREAMING']
    values:
      0x00:
        en: 'Not available'
        fr: 'Non disponible'
      0x01:
        en: 'Available'
        fr: 'Disponible'

  UNUSED_2:
    bits: '7.7'
    unused: true

  BATTERY_STATUS_SIMPLE:
    bits: '7.6-7.4'
    alt_names: ['NIV_BAT_STREAMING']
    type: 'uint8'
    offset: 0
    min: 0
    max: 4
    resolution: 1
    invalid:
    units:

  UNUSED_3:
    bits: '7.3-7.0'
    unused: true
