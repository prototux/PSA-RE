id: 0x1E0
name: 'RADIO_STATUS_CONFIG'
alt_names: ['ETAT_RADIO_GEN_V']
length: 5
comment:
  en: 'General radio configuration'
  fr: 'Configuration generale de la radio'
type: 'can'
periodicity: '500ms'
senders:
  - 'RAD'
  - 'PASS_ICSV'
receivers:
  - 'EMF'
  - 'CMB_EMF'
  - 'PASS_ICSV'

signals:
  TRACK_INTRO_OPTION:
    bits: '1.7-1.6'
    alt_names: ['ISCAN_CFG_CD']
    comment:
      en: 'Intro Scan reading mode Code Item=0x41'
      fr: 'Mode de lecture Intro Scan Code Item=0x41'
    values:
      0x00:
        en: 'Not available'
        fr: 'Non-disponible'
      0x01:
        en: 'Unavailable'
        fr: 'Indisponible'
      0x02:
        en: 'Available'
        fr: 'Disponible'

  TRACK_INTRO_ENABLED:
    bits: '1.5'
    alt_names: ['ISCAN_STAT']
    comment:
      en: 'Activation status of IntroScan reading mode'
      fr: 'Statut d''activation du mode de lecture IntroScan'
    values:
      0x00:
        en: 'Disabled'
        fr: 'Desactive'
      0x01:
        en: 'Enabled'
        fr: 'Active'

  RANDOM_OPTION:
    bits: '1.4-1.3'
    alt_names: ['RDM_TRK_CFG_CD']
    comment:
      en: 'Shuffle mode of tracks Code Item=0x42'
      fr: 'Mode de lecture aléatoire des pistes Code Item=0x42'
    values:
      0x00:
        en: 'Not available'
        fr: 'Non-disponible'
      0x01:
        en: 'Unavailable'
        fr: 'Indisponible'
      0x02:
        en: 'Available'
        fr: 'Disponible'

  RANDOM_ENABLED:
    bits: '1.2'
    alt_names: ['RDM_TRK_STAT']
    comment:
      en: 'Activation status of shuffle mode of tracks / files'
      fr: 'Statut d''activation du mode de lecture aléatoire des pistes/fichiers'
    values:
      0x00:
        en: 'Disabled'
        fr: 'Desactive'
      0x01:
        en: 'Enabled'
        fr: 'Active'

  REPEAT_OPTION:
    bits: '1.1-1.0'
    alt_names: ['REP_DSK_CFG_CD']
    values:
      0x00:
        en: 'Not available'
        fr: 'Non-disponible'
      0x01:
        en: 'Unavailable'
        fr: 'Indisponible'
      0x02:
        en: 'Available'
        fr: 'Disponible'

  REPEAT_ENABLED:
    bits: '2.7'
