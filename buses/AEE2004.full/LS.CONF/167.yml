id: 0x167
name: 'EMF_CONTROL_DATA'
alt_names: ['DEMANDES_EMF']
length: 8
type: 'can'
periodicity: ['100ms', 'trigger']
senders:
  - 'EMF'
  - 'BTEL'
  - 'CMB_EMF'
  - 'NG4'
  - 'RNEG'
  - 'PASS_ICSV'
receivers:
  - 'ICSV'
  - 'BSI'
  - 'CMB'
  - 'RAD'
  - 'PASS_ICSV'

signals:
  RESET_TOTALS_TRIP1_REQUEST:
    bits: '1.7'
    alt_names: ['RAZ_CUMT1_DDES_EMF']
    comment:
      fr: 'Demande de RAZ des cumuls trajet 1'
      en: 'Reset request for total route 1'
    values:
      0x00:
        fr: 'Pas de demande'
        en: 'No request'
      0x01:
        fr: 'Demande'
        en: 'Request'

  RESET_TOTALS_TRIP2_REQUEST:
    bits: '1.6'
    alt_names: ['RAZ_CUMT2_DDES_EMF']
    comment:
      fr: 'Demande de RAZ des cumuls trajet 2'
      en: 'Reset request for total route 2'
    values:
      0x00:
        fr: 'Pas de demande'
        en: 'No request'
      0x01:
        fr: 'Demande'
        en: 'Request'

  CHECK_ALERT_REQUEST:
    bits: '1.5'
    alt_names: ['CHECK_DDES_EMF']
    comment:
      fr: 'Demande de rappel des Alertes (Check)'
      en: 'Alert remind request (Check)'
    values:
      0x00:
        fr: 'Pas de Demande'
        en: 'No Request'
      0x01:
        fr: 'Demande'
        en: 'Request'

  EMERGENCY_CALL_IN_PROGRESS:
    bits: '1.4'
    alt_names: ['APP_URG']
    comment:
      fr: 'Appel d''urgence en cours'
      en: 'Emergency call in progress'
    values:
      0x00:
        fr: 'Pas d''appel d''urgence'
        en: 'No emergency call'
      0x01:
        fr: 'Appel d''urgence en cours'
        en: 'Emergency call in progress'

  RESET_MAINTENANCE_REQUEST:
    bits: '1.3'
    alt_names: ['DMD_RAZ']
    comment:
      fr: 'Demande de remise à zéro de la maintenance'
      en: 'Request for resetting to zero of maintenance'
    values:
      0x00:
        fr: 'Remise à zéro'
        en: 'Reset to zero'
      0x01:
        fr: 'Pas de remise à zéro'
        en: 'No reset to zero'

  TRIP_COMPUTER_PAGE_DISPLAYED:
    bits: '1.2-1.0'
    alt_names: ['PTR_ODB']
    comment:
      fr: 'Information OdB en cours d''affichage dans le combiné'
      en: 'OdB information being displayed in the handset'
    values:
      0x00:
        fr: 'Rien'
        en: 'Nothing'
      0x01:
        fr: 'Paramètres généraux'
        en: 'General parameters'
      0x02:
        fr: 'Trajet 1'
        en: 'Trip 1'
      0x03:
        fr: 'Non attribué'
        en: 'Not assigned'
      0x04:
        fr: 'Trajet 2'
        en: 'Trip 2'
      0x05:
        fr: '4ème page ODB'
        en: '4th ODB page'
      0x06:
        fr: 'Non attribué'
        en: 'Not assigned'
      0x07:
        fr: 'Odb non géré par l''EMF'
        en: 'Odb not managed by EMF'

  THERMAL_PRECONDITIONING_REQUEST:
    bits: '2.7'
    alt_names: ['DDE_PRECOND_CLIM']
    comment:
      fr: 'Demande de préconditionnement thermique'
      en: 'Thermal preconditioning request'
    values:
      0x00:
        fr: 'Pas de Demande'
        en: 'No Request'
      0x01:
        fr: 'Demande'
        en: 'Request'

  DSG_REINIT_REQUEST:
    bits: '2.6'
    alt_names: ['DSG_D_REINIT']
    comment:
      fr: 'Demande de réinitialisation de la DSG indirecte'
      en: 'Request for indirect DSG reset'
    values:
      0x00:
        fr: 'Pas de demande'
        en: 'No request'
      0x01:
        fr: 'Demande'
        en: 'Request'

  BLACK_PANEL_STATUS:
    bits: '2.5'
    alt_names: ['ETAT_BP_DARK']
    comment:
      fr: 'État de la fonction Black Panel associée au push Dark'
      en: 'Status of Black Panel function associated with Dark push'
    values:
      0x00:
        fr: 'Fonction inactivée'
        en: 'Function deactivated'
      0x01:
        fr: 'Fonction activée'
        en: 'Function activated'

  TELEMATICS_FUNCTIONS_STATE:
    bits: '2.4'
    alt_names: ['S_FCT_TELE']
    comment:
      fr: 'État des fonctions télématiques'
      en: 'Telematic functions state'
    values:
      0x00:
        fr: 'Aucune fonction télématique activée'
        en: 'No telematic function activated'
      0x01:
        fr: 'Au moins une fonction télématique activée'
        en: 'At least one telematic function activated'

  PRECONDITIONING_DELAY:
    bits: '2.3-2.0'
    alt_names: ['DELAI']
    comment:
      fr: 'Délai de préconditionnement'
      en: 'Preconditioning delay'
    type: 'uint'
    resolution: 5
    offset: 0
    min: 0
    max: 30
    units: 'minutes'

  TOTAL_MILEAGE_FOR_TRIP:
    bits: '3.7-4.0'
    alt_names: ['KM_TOT_PARC']
    comment:
      fr: 'Kilométrage total de parcours'
      en: 'Total travel mileage'
    type: 'uint16'
    resolution: 0.5
    offset: 0
    min: 0
    max: 10000
    invalid: 0xFFFF
    units: 'km'

  BUTTON_ACTION:
    bits: '7.7-7.4'
    alt_names: ['ACTION']
    comment:
      fr: 'Action de l''utilisateur'
      en: 'User action'
    values:
      0x00:
        fr: 'PAS D''ACTION'
        en: 'NO ACTION'
      0x01:
        fr: 'OUI'
        en: 'YES'
      0x02:
        fr: 'NON'
        en: 'NO'
      0x03:
        fr: 'ESC_CLIENT'
        en: 'ESC_CLIENT'
      0x04:
        fr: 'RETOUR_VALEUR'
        en: 'RETURN_VALUE'
      0x05:
        fr: 'Invalide'
        en: 'Invalid'
      0x06:
        fr: 'Invalide'
        en: 'Invalid'
      0x07:
        fr: 'Invalide'
        en: 'Invalid'
      0x08:
        fr: 'Invalide'
        en: 'Invalid'
      0x09:
        fr: 'Invalide'
        en: 'Invalid'
      0x0A:
        fr: 'Invalide'
        en: 'Invalid'
      0x0B:
        fr: 'Invalide'
        en: 'Invalid'
      0x0C:
        fr: 'Invalide'
        en: 'Invalid'
      0x0D:
        fr: 'Invalide'
        en: 'Invalid'
      0x0E:
        fr: 'Invalide'
        en: 'Invalid'
      0x0F:
        fr: 'TIME_OUT_IHM'
        en: 'HMI_TIME_OUT'

  UNUSED_1:
    bits: '7.3'
    alt_names: ['LIBRE_1']
    unused: true

  UNUSED_2:
    bits: '7.2-7.0'
    alt_names: ['LIBRE_2']
    unused: true

  VALEUR:
    bits: '8.7-8.0'
    alt_names: ['VALEUR']
    comment:
      fr: 'Valeur saisie'
      en: 'Entry value'
    type: 'uint8'

  UNUSED_3:
    bits: '5.7-6.0'
    alt_names: ['LIBRE_3']
    unused: true