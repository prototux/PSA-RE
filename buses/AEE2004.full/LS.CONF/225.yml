id: 0x225
name: 'RADIO_STATUS_TUNER'
alt_names: ['ETAT_RADIO_TUNER_TUN']
length: 5
comment:
  en: 'Tuner status'
  fr: 'Etat du tuner'
type: 'can'
periodicity: ['500ms']
senders:
  - 'RAD'
  - 'PASS_ICSV'
receivers:
  - 'EMF'
  - 'CMB_EMF'
  - 'MATT'
  - 'PASS_ICSV'

signals:
  DISPLAY_LIST:
    bits: '1.7'
    alt_names: ['LISTE_TUN_PTY']
    values:
      0x00:
        en: 'No display'
        fr: 'Ne pas afficher'
      0x01:
        en: 'Display'
        fr: 'Affiche'

  MANUAL_TUNING:
    bits: '1.6'
    alt_names: ['MAN_TUN']
    comment:
      en: 'Manual tuning mode'
      fr: 'Mode de syntonisation manuelle'
    values:
      0x00:
        en: 'Not requested'
        fr: 'Non demandée'
      0x01:
        en: 'Requested'
        fr: 'Demandée'

  SEARCH_DIRECTION:
    bits: '1.5'
    alt_names: ['DIR_TUN']
    values:
      0x00:
        en: 'Down'
        fr: 'Decroissant'
      0x01:
        en: 'Up'
        fr: 'Croissant'

  TUNER_SENSITIVITY:
    bits: '1.4'
    alt_names: ['SNS_TUN']
    comment:
      en: 'Tuner sensitivity'
      fr: 'Sensibilité du tuner'
    values:
      0x00:
        en: 'Lo'
        fr: 'Lo'
      0x01:
        en: 'Dx'
        fr: 'Dx'

  SEARCH_STATUS:
    bits: '1.3-1.0'
    alt_names: ['SRCH_TUN']
    comment:
      en: 'Search status'
      fr: 'Etat de la recherche'
    values:
      0x00:
        en: 'Not searching'
        fr: 'Aucune recherche'
      0x01:
        en: 'Manual search'
        fr: 'Recherche manuelle'
      0x02:
        en: 'Auto frequency search'
        fr: 'Recherche auto de frequence'
      0x03:
        en: 'Auto program search'
        fr: 'Recherche auto programme'
      0x04:
        en: 'Auto RDS search'
        fr: 'Recherche auto RDS'
      0x05:
        en: 'Auto PTY search'
        fr: 'Recherche auto PTY'
      0x06:
        en: 'Auto AF search'
        fr: 'Recherche auto AF'
      0x07:
        en: 'Auto signal search'
        fr: 'Recherche auto signal'
      0x08:
        en: 'From favories'
        fr: 'Depuis les favoris'
      0xFF:
        en: 'Error'
        fr: 'Erreur'

  CURRENT_MEMORY:
    bits: '2.7-2.4'
    alt_names: ['NUM_TUN']
    comment:
      en: 'Active memory number'
      fr: 'Numero de memoire active'
    type: 'uint8'
    offset: 0
    min: 0
    max: 15
    resolution: 1
    invalid:
    units:

  UNUSED_1:
    bits: '2.3-2.0'
    unused: true

  PTY_AVAILABLE:
    bits: '3.7'
    alt_names: ['LISTE_PTY_OK']
    comment:
      en: 'PTY info availability'
      fr: 'Disponibilité des infos PTY'
    values:
      0x00:
        en: 'Not available'
        fr: 'Not available'
      0x01:
        en: 'Available'
        fr: 'Disponible'

  BAND:
    bits: '3.6-3.4'
    alt_names: ['BQE_TUN']
    values:
      0x00:
        en: 'None'
        fr: 'Aucun'
      0x01:
        en: 'FM1'
        fr: 'FM1'
      0x02:
        en: 'FM2'
        fr: 'FM2'
      0x03:
        en: 'FM3'
        fr: 'FM3'
      0x04:
        en: 'FMAST'
        fr: 'FMAST'
      0x05:
        en: 'AM'
        fr: 'AM'

  UNUSED_2:
    bits: '3.3-3.0'
    unused: true

  UNUSED_3:
    bits: '4.7-4.3'
    unused: true

  FREQUENCY:
    bits: '4.2-5.0'
    alt_names: ['FRQ_TUN']
    comment:
      en: 'Tuned frequency'
      fr: 'Frequence syntonisee'
    min: 0
    max: 2046
    offset: 50
    factor: 0.05
    units: 'khz/mhz'
