id: 0x120
name: 'VEHICLE_ALERT_LOG'
alt_names: ['JOURNAL_ALERTES']
length: 8
type: 'can'
periodicity: ['1000ms']
senders:
  - 'BSI'
receivers:
  - 'BTEL'
  - 'EMF'
  - 'CMB_EMF'
  - 'CMB'
  - 'MDS'
  - 'RNEG'

signals:
  NUMERO_BLOC:
    bits: '1.7-1.6'
    alt_names: ['NUMERO_BLOC']
    comment:
      fr: 'Identification du bloc de données "ALERTES_VEHICULE"'
      en: '"ALERTES_VEHICULE" data block identification'
    values:
      0x00:
        fr: 'Données invalides'
        en: 'Invalid data'
      0x01:
        fr: 'Bloc de données n°1'
        en: 'Data block #1'
      0x02:
        fr: 'Bloc de données n°2'
        en: 'Data block #2'
      0x03:
        fr: 'Bloc de données n°3'
        en: 'Data block #3'

  NB_BLOC:
    bits: '1.5-1.4'
    alt_names: ['NB_BLOC']
    comment:
      fr: 'Nombre total de bloc de données "ALERTES_VEHICULE" nécessaires pour la fonction JDA'
      en: 'Total number of data block "ALERTES_VEHICULE" necessary for the Alert Log function'
    values:
      0x00:
        fr: 'Données invalides'
        en: 'Invalid data'
      0x01:
        fr: '1 bloc de données'
        en: '1 data block'
      0x02:
        fr: '2 blocs de données'
        en: '2 data blocks'
      0x03:
        fr: '3 blocs de données'
        en: '3 data blocks'

  ACCES_JDA:
    bits: '1.3-1.2'
