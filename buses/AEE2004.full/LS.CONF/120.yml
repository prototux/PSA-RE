    values:
      0x00:
        fr: 'Menu non accessible et non activable'
        en: 'Menu not accessible and not activable'
      0x01:
        fr: 'Menu non accessible activable'
        en: 'Menu not accessible but activable'
      0x02:
        fr: 'Menu accessible et non activable'
        en: 'Menu accessible but not activable'
      0x03:
        fr: 'Menu accessible et activable'
        en: 'Menu accessible and activable'

