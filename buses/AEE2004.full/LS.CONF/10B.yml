id: 0x10B
name: 'STEERING_WHEEL_ANGLE'
alt_names: ['IS_DYN_VOL']
length: 7
type: 'can'
periodicity: ['100ms']
senders:
  - 'PASS_BSI'
receivers:
  - 'DEF'
  - 'SAM'
  - 'AAS'

signals:
  ANGLE_VOLANT:
    bits: '1.7-2.0'
    alt_names: ['ANGLE_VOLANT']
    comment:
      fr: 'Angle volant'
      en: 'Steering wheel angle'
    type: 'int16'
    resolution: 0.1
    offset: 0
    min: -780
    max: 780
    invalid: 0x7FFF
    units: '°'

  VITESSE_ROT_VOL:
    bits: '3.7-3.0'
    alt_names: ['VITESSE_ROT_VOL']
    comment:
      fr: 'Vitesse rotation volant'
      en: 'Wheel rotation speed'
    type: 'uint8'
    resolution: 4
    offset: 0
    min: 0
    max: 1016
    invalid: 0xFF
    units: '°/s'

  SENS_ROT_VOL:
    bits: '4.7'
    alt_names: ['SENS_ROT_VOL']
    comment:
      fr: 'Sens rotation capteur angle volant'
      en: 'Direction of rotation of the wheel angle sensor'
    values:
      0x00:
        fr: 'Sens trigonométrique'
        en: 'Counterclockwise direction'
      0x01:
        fr: 'Sens horaire'
        en: 'Clockwise direction'

  CODE_DEFAUT_VOL:
    bits: '4.6-4.3'
    alt_names: ['CODE_DEFAUT_VOL']
    comment:
      fr: 'Code défaut capteur angle volant'
      en: 'Fault code of steering wheel angle sensor'
    values:
      0x00:
        fr: 'Pas ou plus de défaut'
        en: 'No fault or fault cleared'
      0x01:
        fr: 'Incohérence détectée par ESP info vitesse rotation volant'
        en: 'Inconsistency detected by ESP on wheel rotation speed info'
      0x02:
        fr: 'Incohérence détectée par ESP info angle volant'
        en: 'Inconsistency detected by ESP on steering wheel angle info'
      0x03:
        fr: 'Incohérence détectée par ESP info vitesse volant et angle'
        en: 'Inconsistency detected by ESP on wheel speed and angle info'
      0x04:
        fr: 'Incohérence sur l''info angle volant'
        en: 'Inconsistency on steering wheel angle info'
      0x05:
        fr: 'Incohérence sur l''info vitesse rotation volant'
        en: 'Inconsistency on wheel rotation speed info'
      0x06:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x07:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x08:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x09:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x0A:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x0B:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x0C:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x0D:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x0E:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'
      0x0F:
        fr: 'Défauts internes détectés par capteur angle volant'
        en: 'Internal faults detected by steering wheel angle sensor'

  TRIM_VOL:
    bits: '4.2'
    alt_names: ['TRIM_VOL']
    comment:
      fr: 'Capteur angle volant ajusté (Trim). Indication de réglage en usine fournisseur'
      en: 'Trimmed steering wheel angle sensor. Indication of supplier default setting'
    values:
      0x00:
        fr: 'Capteur non ajusté'
        en: 'Sensor not trimmed'
      0x01:
        fr: 'Capteur ajusté'
        en: 'Sensor trimmed'

  CALIBRATION_VOL:
    bits: '4.1'
    alt_names: ['CALIBRATION_VOL']
    comment:
      fr: 'Capteur angle volant calibré'
      en: 'Calibrated steering wheel angle sensor'
    values:
      0x00:
        fr: 'Capteur non calibré'
        en: 'Sensor not calibrated'
      0x01:
        fr: 'Capteur calibré'
        en: 'Sensor calibrated'

  ETAT_CAPT_VOL:
    bits: '4.0'
    alt_names: ['ETAT_CAPT_VOL']
    comment:
      fr: 'Status interne capteur angle volant'
      en: 'Internal status of steering wheel angle sensor'
    values:
      0x00:
        fr: 'Capteur en défaut'
        en: 'Sensor fault'
      0x01:
        fr: 'Capteur OK'
        en: 'Sensor OK'

  CHKSUM_VOL:
    bits: '5.7-5.4'
    alt_names: ['CHKSUM_VOL']
    comment:
      fr: 'Checksum angle volant'
      en: 'Steering wheel angle checksum'
    type: 'uint8'

  CPT_PROCESS_4B_A_VOL:
    bits: '5.3-5.0'
    alt_names: ['CPT_PROCESS_4B_A_VOL']
    comment:
      fr: 'Compteur de process 4 bits ESP'
      en: 'ESP 4 bits process counter'
    type: 'uint8'

  VITESSE_ROT_VOL_OPTIMISE:
    bits: '6.7-6.0'
    alt_names: ['VITESSE_ROT_VOL_OPTIMISE']
    comment:
      fr: 'Vitesse rotation volant temps de réponse optimisé'
      en: 'Wheel rotation speed, optimized response time'
    type: 'uint8'
    resolution: 4
    offset: 0
    min: 0
    max: 1016
    invalid: 0xFF
    units: '°/s'

  FLG_INIT_AVOL:
    bits: '7.7'
    alt_names: ['FLG_INIT_AVOL']
    comment:
      fr: 'Flag initialisation de l''angle volant'
      en: 'Initialization steering wheel angle flag'
    values:
      0x00:
        fr: 'Angle volant disponible'
        en: 'Steering wheel angle available'
      0x01:
        fr: 'Angle volant mémorisé'
        en: 'Steering wheel angle memorized'

  FLG_AVOL_ICN:
    bits: '7.6'
    alt_names: ['FLG_AVOL_ICN']
    comment:
      fr: 'Flag angle volant incertain'
      en: 'Absolute steering wheel angle unaccurate'
    values:
      0x00:
        fr: 'Angle volant précis'
        en: 'Accurate steering wheel angle'
      0x01:
        fr: 'Angle volant incertain'
        en: 'Unaccurate steering wheel angle'

  LIBRE_6:
    bits: '7.5-7.0'
    alt_names: ['LIBRE_6']
    unused: true