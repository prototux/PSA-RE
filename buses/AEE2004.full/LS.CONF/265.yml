id: 0x265
name: 'RADIO_STATUS_FM_CURRENT'
length: 4 # at least 4 since there are signals defined until 4.7
comment:
  en: 'Current station informations'
  fr: 'Informations sur la station FM selectionnee'
type: 'can'
periodicity: ['500ms']
senders:
  - 'RAD'
  - 'PASS_ICSV'
receivers:
  - 'EMF'
  - 'MATT'
  - 'CMB_EMF'
  - 'CDC'
  - 'PASS_ICSV'

signals:
  AF_ACTIVATED:
    bits: '1.7'
    alt_names: ['AF']
    comment:
      en: 'Alternative frequencies activated'
      fr: 'Frequences alternatives activees'
    values:
      0x00:
        en: 'Disabled'
        fr: 'Desactive'
      0x01:
        en: 'Enabled'
        fr: 'Active'

  AF_STATUS:
    bits: '1.6-1.5'
    alt_names: ['AF_OK']
    comment:
      en: 'Alternative frequencies status'
      fr: 'Etat des frequences alternatives'
    values:
      0x00:
        en: 'Not available'
        fr: 'Non disponible'
      0x01:
        en: 'Available'
        fr: 'Disponible'
      0x02:
        en: 'Working'
        fr: 'Traitement'

  TA_ACTIVATED:
    bits: '1.4'
    alt_names: ['TA']
    comment:
      en: 'Traffic announcements activated'
      fr: 'Annonces trafic activees'
    values:
      0x00:
        en: 'Disabled'
        fr: 'Desactive'
      0x01:
        en: 'Enabled'
        fr: 'Active'

  TA_STATUS:
    bits: '1.3-1.2'
    alt_names: ['TA_OK']
    comment:
      en: 'Traffic announcements status'
      fr: 'Etat des annonces trafic'
    values:
      0x00:
        en: 'Not available'
        fr: 'Non disponible'
      0x01:
        en: 'Available'
        fr: 'Disponible'
      0x02:
        en: 'Working'
        fr: 'Traitement'

  TA_OUT:
    bits: '1.1'
    alt_names: ['TA_OUT']
    comment:
      en: 'Traffic announcements playing'
      fr: 'Annonces trafic en cours'
    values:
      0x00:
        en: 'No'
        fr: 'Non'
      0x01:
        en: 'Yes'
        fr: 'Oui'

  REG:
    bits: '1.0'
    alt_names: ['REG']
    comment:
      en: 'Regional mode'
      fr: 'Mode regional'
    values:
      0x00:
        en: 'Off'
        fr: 'Desactive'
      0x01:
        en: 'On'
        fr: 'Active'

  PTY_MODE:
    bits: '2.7-2.6'
    alt_names: ['PTY']
    values:
      0x00:
        en: 'Not requested'
        fr: 'Non demande'
      0x01:
        en: 'Selection mode'
        fr: 'Mode selection'
      0x02:
        en: 'Surveillance mode'
        fr: 'Mode surveillance'

  PTY_STATUS:
    bits: '2.5-2.4'
    alt_names: ['PTY_OK']
    comment:
      en: 'Program type status'
      fr: 'Etat du type de programme'
    values:
      0x00:
        en: 'Not available'
        fr: 'Non disponible'
      0x01:
        en: 'Available, but currently on other PTY'
        fr: 'Disponible, different du PTY actuel'
      0x02:
        en: 'Available, and same PTY as current'
        fr: 'Disponible, identique au PTY actuel'
      0x03:
        en: 'Working'
        fr: 'Traitement'

  TMC:
    bits: '2.3'
    alt_names: ['TMC']
    comment:
      en: 'Traffic Message Channel requested'
      fr: 'TMC demande'
    values:
      0x00:
        en: 'Disabled'
        fr: 'Desactive'
      0x01:
        en: 'Enabled'
        fr: 'Active'

  TMC_STATUS:
    bits: '2.2-2.1'
    alt_names: ['TMC_OK']
    comment:
      en: 'Traffic Message Channel status'
      fr: 'Etat du TMC'
    values:
      0x00:
        en: 'Not available'
        fr: 'Non disponible'
      0x01:
        en: 'Available'
        fr: 'Disponible'
      0x02:
        en: 'Working'
        fr: 'Traitement'

  UNUSED_1:
    bits: '2.0'

  PTY_SELECTED:
    bits: '3.7-3.0'
    alt_names: ['PTY_SEL']
    comment:
      en: 'Selected program type'
      fr: 'Type de programme selectionne'
