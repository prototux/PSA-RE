id: 0x220
name: 'DOORS_STATUS'
length: 2
type: 'can'
periodicity: '500ms'
senders:
  - 'BSI'
receivers:
  - 'CMB'
  - 'EMF'

signals:
  FRONT_LEFT_DOOR:
    bits: '1.7'
    alt_names: ['ETAT_PORTE_AVG']
    comment:
      en: 'Front left door status'
      fr: 'Etat porte avant gauche'
    values:
      0x00:
        en: 'Closed'
        fr: 'Fermee'
      0x01:
        en: 'Opened'
        fr: 'Ouverte'

  FRONT_RIGHT_DOOR:
    bits: '1.6'
    alt_names: ['ETAT_PORTE_AVD']
    comment:
      en: 'Front right door status'
      fr: 'Etat porte avant droite'
    values:
      0x00:
        en: 'Closed'
        fr: 'Fermee'
      0x01:
        en: 'Opened'
        fr: 'Ouverte'

  REAR_LEFT_DOOR:
    bits: '1.5'
    alt_names: ['ETAT_PORTE_ARG']
    comment:
      en: 'Rear left door status'
      fr: 'Etat porte arriere gauche'
    values:
      0x00:
        en: 'Closed'
        fr: 'Fermee'
      0x01:
        en: 'Opened'
        fr: 'Ouverte'

  REAR_RIGHT_DOOR:
    bits: '1.4'
    alt_names: ['ETAT_PORTE_ARD']
    comment:
      en: 'Rear right door status'
      fr: 'Etat porte arriere droite'
    values:
      0x00:
        en: 'Closed'
        fr: 'Fermee'
      0x01:
        en: 'Opened'
        fr: 'Ouverte'

  TRUNK:
    bits: '1.3'
    alt_names: ['ETAT_COFFRE_BAG']
    comment:
      en: 'Trunk status'
      fr: 'Etat du coffre'
    values:
      0x00:
        en: 'Closed'
        fr: 'Ferme'
      0x01:
        en: 'Opened'
        fr: 'Ouvert'

  HOOD:
    bits: '1.2'
    alt_names: ['ETAT_CAP']
    comment:
      en: 'Hood status'
      fr: 'Etat capot'
    values:
      0x00:
        en: 'Closed'
        fr: 'Ferme'
      0x01:
        en: 'Opened'
        fr: 'Ouvert'

  REAR_WINDOW: # On SW models only
    bits: '1.1'
    alt_names: ['ETAT_LUN_AR']
    comment:
      en: 'Rear window status'
      fr: 'Etat lunette arriere'
    values:
      0x00:
        en: 'Closed'
        fr: 'Fermee'
      0x01:
        en: 'Opened'
        fr: 'Ouverte'

  FUEL_CAP:
    bits: '1.0'
    alt_names: ['ETAT_BOUCHON_CARB']
    comment:
      en: 'Fuel cap status'
      fr: 'Etat bouchon carburant'
    values:
      0x00:
        en: 'Closed'
        fr: 'Ferme'
      0x01:
        en: 'Opened'
        fr: 'Ouvert'

  CAR_TYPE:
    bits: '2.7'
    alt_names: ['TYPE_VEHICULE']
    comment:
      en: 'Car type'
      fr: 'Type voiture'
    values:
      0x00:
        en: '5 doors'
        fr: '5 portes'
      0x01:
        en: '3 doors'
        fr: '3 portes'

  CAR_TYPE:
    bits: '2.6'
    alt_names: ['ETAT_BRDS']
    comment:
      en: 'Spare wheel arm status'
      fr: 'Etat bras de roue de secours'
    values:
      0x00:
        en: 'Closed'
        fr: 'Ferme'
      0x01:
        en: 'Opened'
        fr: 'Ouvert'

  UNUSED_1:
    bits: '2.5-2.0'
    unused: true
