id: 0x297
name: 'HUD_STATUS'
alt_names: ['ETAT_VTH']
length: 2
type: 'can'
periodicity: ['200ms', 'trigger']
senders:
  - 'VTH'
receivers:
  - 'BSI'
  - 'MATT'

signals:
  UNUSED_1:
    bits: '1.7-1.5'
    alt_names: ['LIBRE_1']
    unused: true

  ACTIV_VTH:
    bits: '1.4-1.3'
    alt_names: ['ACTIV_VTH']
    comment:
      fr: 'État d''activation de la VTH'
      en: 'HUD activation status'
    values:
      0x00:
        fr: 'VTH non activée'
        en: 'HUD not activated'
      0x01:
        fr: 'VTH activée'
        en: 'HUD activated'
      0x02:
        fr: 'Indisponible'
        en: 'Unavailable'
      0x03:
        fr: 'Invalide'
        en: 'Invalid'

  MEMO_VTH:
    bits: '1.2'
    alt_names: ['MEMO_VTH']
    comment:
      fr: 'Mémorisation en cours'
      en: 'Storing in progress'
    values:
      0x00:
        fr: 'Pas de mémorisation en cours'
        en: 'No storing in progress'
      0x01:
        fr: 'Mémorisation en cours'
        en: 'Storing in progress'

  MEMO_RAPPEL_VTH:
    bits: '1.1'
    alt_names: ['MEMO_RAPPEL_VTH']
    comment:
      fr: 'Rappel mémorisation VTH'
      en: 'HUD memory recall'
    values:
      0x00:
        fr: 'Pas de rappel de mémorisation'
        en: 'No memory recall'
      0x01:
        fr: 'Rappel de mémorisation'
        en: 'Memory recall'

  MOUV_MIROIR_VTH:
    bits: '1.0'
    alt_names: ['MOUV_MIROIR_VTH']
    comment:
      fr: 'Miroir en mouvement manuel'
      en: 'Mirror in manual movement'
    values:
      0x00:
        fr: 'Pas de mouvement manuel du miroir'
        en: 'No manual mirror movement'
      0x01:
        fr: 'Mouvement manuel du miroir'
        en: 'Manual mirror movement'

  VITESSE_AFF_VTH:
    bits: '2.7-2.0'
    alt_names: ['VITESSE_AFF_VTH']
    comment:
      fr: 'Vitesse affichée à la VTH'
      en: 'Speed displayed on the HUD'
    type: 'uint8'
    resolution: 1
    offset: 0
    min: 0
    max: 254
    invalid: 0xFF
    units: 'from GESTION_VITESSE frame'
