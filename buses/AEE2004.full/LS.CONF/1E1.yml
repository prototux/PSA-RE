id: 0x1E1
name: 'TPMS_STATUS'
alt_names: ['DONNEES_ETAT_ROUES']
length: 8
comment:
  en: 'Contains tyre pressure monitoring system information'
  fr: 'Contient des informations relatives au système de surveillance de la pression des pneus'
type: 'can'
periodicity: ['500ms']
senders:
  - 'BSI'
receivers:
  - 'EMF'
  - 'CMB'
  - 'BTEL'
  - 'CMB_EMF'
  - 'MATT'
  - 'BGP'

signals:
  FRONT_LEFT_WHEEL_STATUS:
    alt_names: ['ETAT_ROUE_AVG']
    bits: "1.7-1.3"
    comment:
      fr: "Etat de la roue AVG"
      en: "Front left wheel status"
    values:
      0x01:
        fr: "Roue crevée"
        en: "Flat tyre"
      0x02:
        fr: "Roue faiblement dégonflée"
        en: "Slightly deflated tyre"
      0x04:
        fr: "Roue fortement dégonflée"
        en: "Heavily deflated tyre"
      0x08:
        fr: "Pression roue non surveillée"
        en: "Tyre pressure not monitored"
      0x10:
        fr: "Pression normale"
        en: "Normal pressure"

  FRONT_LEFT_PAX_WHEEL_STATUS:
    alt_names: ['ETAT_PAX_AVG']
    bits: "1.2-1.1"
    comment:
      fr: "Etat roue PAX AVG"
      en: "Front left PAX wheel status"
