id: 0x3E1
name: 'HYBRID_START_STOP_INFO'
alt_names: ['INFOS_STT_ET_HY']
length: 5
comment:
  en: 'Contains hybrid and start-stop information'
  fr: 'Contient des informations relatives à l''hybride et au start-stop'
type: 'can'
periodicity: ['200ms']
senders:
  - 'BSI'
receivers:
  - 'RNEG'
  - 'CMB'
  - 'MATT'
  - 'NG4'
  - 'EMF'
  - 'BTEL'
  - 'CMB_EMF'

signals:
  HOURS_STOP_COUNTER:
    alt_names: ['CPT_STOP_HEURE']
    bits: "1.7-1.6"
    comment:
      fr: "Heure à STOP"
      en: "Hour in STOP"
    type: uint8
    resolution: 1
    offset: 0
    min: 0
    max: 3
    units: "heure(s)"

  MINUTES_STOP_COUNTER:
    alt_names: ['CPT_STOP_MINUTE']
    bits: "1.5-1.0"
    comment:
      fr: "Minutes à STOP"
      en: "Minutes to STOP"
    type: uint8
    resolution: 1
    offset: 0
    min: 0
    max: 59
    invalid: 63
    units: "minute(s)"

  SECONDS_STOP_COUNTER:
    alt_names: ['CPT_STOP_SECONDE']
    bits: "2.7-2.2"
    comment:
      fr: "Secondes à STOP"
      en: "Seconds to STOP"
    type: uint8
    resolution: 1
    offset: 0
    min: 0
    max: 59
    invalid: 63

  UNUSED_1:
    alt_names: ['LIBRE_1']
    bits: "2.1-3.0"
    unused: true

  START_STOP_AVAILABILITY:
    alt_names: ['DISPO_FCT_STT_HY']
    bits: "4.7-4.6"
    comment:
      fr: "Disponibilité fonction STT"
      en: "STT function availability"
    values:
      0:
        fr: "Indisponible"
        en: "Unavailable"
      1:
        fr: "Activé"
        en: "Activated"
      2:
        fr: "Désactivé"
        en: "Deactivated"
      3:
        fr: "Invalide"
        en: "Invalid"

  START_STOP_PRESENCE:
    alt_names: ['PRESENCE_STT']
    bits: "4.5"
    comment:
      fr: "Présence du STT"
      en: "Presence of STT"
    values:
      0:
        fr: "Absent"
        en: "Absent"
      1:
        fr: "Présent"
        en: "Present"

  ZERO_EMISSION_REQUEST:
    alt_names: ['DMD_ZERO_EMISSION']
    bits: "4.4"
    comment:
      fr: "Demande de zéro émission"
      en: "Zero emission request"
    values:
      0:
        fr: "Pas de demande"
        en: "No request"
      1:
        fr: "Demande"
        en: "Request"

  COMBUSTION_ENGINE_STATUS:
    alt_names: ['ETAT_MTH']
    bits: "4.3-4.2"
    comment:
      fr: "Etat du moteur thermique"
      en: "Status of combustion engine"
    values:
      0:
        fr: "Non activé"
        en: "Not activated"
      1:
        fr: "Moteur"
        en: "Engine"
      2:
        fr: "Résistant"
        en: "Resisting"
      3:
        fr: "Invalide"
        en: "Invalid"

  ELECTRIC_MOTOR_STATUS:
    alt_names: ['ETAT_MEL']
    bits: "4.1-4.0"
    comment:
      fr: "Etat du moteur électrique"
      en: "Status of electric motor"
    values:
      0:
        fr: "Non activé"
        en: "Not activated"
      1:
        fr: "Moteur"
        en: "Motor"
      2:
        fr: "Résistant"
        en: "Resisting"
      3:
        fr: "Invalide"
        en: "Invalid"

  CHARGE_STATUS:
    alt_names: ['RECHARGE']
    bits: "5.7-5.6"
    comment:
      fr: "Etat de la charge"
      en: "Status of current load"
    values:
      0:
        fr: "Non activé"
        en: "Not activated"
      1:
        fr: "Recharge"
        en: "Reload"
      2:
        fr: "Décharge"
        en: "Discharge"
      3:
        fr: "Invalide"
        en: "Invalid"

  UNUSED_2:
    alt_names: ['LIBRE_2']
    bits: "5.5-5.0"
    unused: true