id: 0x3F6
name: 'CONFIG_DISPLAY'
alt_names: ['DATE_CONFIG']
length: 7
type: 'can'
periodicity: ['1000ms']
senders:
  - 'EMF'
  - 'BTEL'
  - 'CMB_EMF'
  - 'NG4'
  - 'RNEG'

receivers:
  - 'BSI'
  - 'CMB'
  - 'VTH'
  - 'PASS_BSI'
  - 'KML'
  - 'MDS'
  - 'MATT'
  - 'CDC'
  - 'BGP'

signals:
  TIMESTAMP_SECS:
    bits: '1.7-3.4'
    alt_names: ['SECONDE']
    comment:
      en: 'Number of seconds elapsed since the last power on of + PERM of the EMF - Binary counter modulo 86400 (24h*3600s)'
      fr: 'Secondes écoulées depuis le dernier allumage de + PERM de l''EMF'
    type: 'uint'
    offset: 0
    min: 0
    max: 86339
    resolution: 1
    invalid:  0xFFFFF
    units: 's'

  TIMESTAMP_DAYS:
    bits: '3.3-4.0'
    alt_names: ['JOUR']
    comment:
      en: 'Number of days elapsed since the last power on of + PERM of the EMF - Binary counter modulo 365'
      fr: 'Jours écoulés depuis le dernier allumage de + PERM de l''EMF'
    type: 'uint'
    offset: 0
    min: 0
    max: 364
    resolution: 1
    invalid:  0xFFF
    units: 'days'

  TIMESTAMP_YEARS:
    bits: '5.7-5.0'
    alt_names: ['ANNEE']
    comment:
      en: 'Number of years elapsed since the last power on of + PERM of the EMF - Binary counter modulo 100'
      fr: 'Annees écoulées depuis le dernier allumage de + PERM de l''EMF'
    type: 'uint8'
    offset: 0
    min: 0
    max: 100
    resolution: 1
    invalid:  0xFF
    units: 'years'

  CONFIG_DISPLAY_TIME:
    bits: '6.7'
    alt_names: ['MODE_HEURE_CLIENT']
    comment:
      en: 'Time display mode'
      fr: 'Mode affichage horaire'
    values:
      0x00:
        en: '12h'
        fr: '12h'
      0x01:
        en: '24h'
        fr: '24h'

  CONFIG_DISPLAY_MODE:
    bits: '6.6'
    alt_names: ['POS_NEG_CONF_CLIENT']
    comment:
      en: 'Display mode'
      fr: 'Mode affichage'
    values:
      0x00:
        en: 'Negative'
        fr: 'Negatif'
      0x01:
        en: 'Positive'
        fr: 'Positif'

  CONFIG_TEMP_UNIT:
    bits: '6.5'
    alt_names: ['UNITE_TEMP_CLIENT']
    comment:
      en: 'Temperature unit'
      fr: 'Unite temperature'
    values:
      0x00:
        en: 'Celsius'
        fr: 'Celsius'
      0x01:
        en: 'Fahrenheit'
        fr: 'Fahrenheit'

  CHARACTERSET_CONFIG:
    bits: '6.4'
    alt_names: ['CARACT_MAUD']
    comment:
      en: 'Configured character set'
      fr: 'Jeu de caracteres configure'
    values:
      0x00:
        en: 'ASCII'
        fr: 'ASCII'
      0x01:
        en: 'UTF-8'
        fr: 'UTF-8'

  CONFIG_PRESSURE_UNIT:
    bits: '6.3'
    alt_names: ['UNITE_PRESS']
    comment:
      en: 'Pressure unit'
      fr: 'Unite pression'
    values:
      0x00:
        en: 'Bar'
        fr: 'Bar'
      0x01:
        en: 'PSI'
        fr: 'PSI'

  CONFIG_CONSUMPTION_UNIT:
    bits: '6.2'
    alt_names: ['UNITE_CONSO']
    comment:
      en: 'Consuption unit type'
      fr: 'Type unite consommation'
    values:
      0x00: # Eg. liters/kilometers
        en: 'Volume per distance'
        fr: 'Volume pour une distance'
      0x01: # Eg. miles/gallon
        en: 'Distance per volume'
        fr: 'Distance pour un volume'

  CONFIG_VOLUME_UNIT:
    bits: '6.1'
    alt_names: ['UNITE_VOLUME']
    comment:
      en: 'Volume unit'
      fr: 'Unite volume'
    values:
      0x00:
        en: 'Liter'
        fr: 'Litre'
      0x01:
        en: 'Gallon'
        fr: 'Gallon'

  CONFIG_DISTANCE_UNIT:
    bits: '6.0'
    alt_names: ['UNITE_DIST']
    comment:
      en: 'Distance unit'
      fr: 'Unite distance'
    values:
      0x00:
        en: 'Kilometer'
        fr: 'Kilometre'
      0x01:
        en: 'Mile'
        fr: 'Mile'

  UNUSED_1:
    bits: '7.7-7.4'
    unused: true

  CONFIG_LANGUAGE:
    bits: '7.3-7.0'
    alt_names: ['LANGUE']
    comment:
      en: 'Language'
      fr: 'Langue'
    values:
      0x00:
        en: 'French'
        fr: 'Francais'
      0x01:
        en: 'English'
        fr: 'Anglais'
      0x02:
        en: 'German'
        fr: 'Allemand'
      0x03:
        en: 'Spanish'
        fr: 'Espagnol'
      0x04:
        en: 'Italian'
        fr: 'Italien'
      0x05:
        en: 'Portugese'
        fr: 'Portugais'
      0x06:
        en: 'Dutch'
        fr: 'Neerlandais'
      0x07:
        en: 'Greek'
        fr: 'Grec'
      0x08:
        en: 'Brasilian'
        fr: 'Bresilien'
      0x09:
        en: 'Polish'
        fr: 'Polonais'
      0x0A:
        en: 'Traditional Chinese'
        fr: 'Chinois traditionnel'
      0x0B:
        en: 'Simplified Chinese'
        fr: 'Chinois simplifie'
      0x0C:
        en: 'Turkish'
        fr: 'Turc'
      0x0E:
        en: 'Russian'
        fr: 'Russe'
      # What is 0x0B?
