id: 0x1A1
name: 'BSI_DISPLAY_MESSAGE'
alt_names: ['BSI_CDE_PTR_MESSAGE']
length: 8
type: 'can'
periodicity: '200ms'
senders:
  - 'BSI'
receivers:
  - 'EMF'
  - 'CMB' # After it went to MATT
  - 'VTH'
  - 'BTEL'
  - 'CMB_EMF'
  - 'RNEG'
  - 'MATT'

signals:
  DISPLAY_MESSAGE:
    bits: '1.7'
    alt_names: ['NOUV_MESS']
    comment:
      en: 'Display new message'
      fr: 'Afficher nouveau message'
    values:
      0x00:
        en: 'No new message'
        fr: 'Aucun nouveau message'
      0x01:
        en: 'New message'
        fr: 'Nouveau message'

  MESSAGE_ID:
    bits: '1.6-2.0'
    alt_names: ['POINT_MESS']
    comment:
      en: 'Message number'
      fr: 'Numero du message'

  DEST_EMF:
    bits: '3.7'
    alt_names: ['MEDIA1']
    comment:
      en: 'EMF should display the message'
      fr: 'Le destinataire EMF doit afficher le message'
    values:
      0x00:
        en: 'No'
        fr: 'Non'
      0x01:
        en: 'Yes'
        fr: 'Oui'

  DEST_CMB:
    bits: '3.6'
    alt_names: ['MEDIA2']
    comment:
      en: 'CMB should display the message'
      fr: 'Le destinataire CMB doit afficher le message'
    values:
      0x00:
        en: 'No'
        fr: 'Non'
      0x01:
        en: 'Yes'
        fr: 'Oui'

  DEST_VTH:
    bits: '3.5'
    alt_names: ['MEDIA3']
    comment:
      en: 'VTH should display the message'
      fr: 'Le destinataire VTH doit afficher le message'
    values:
      0x00:
        en: 'No'
        fr: 'Non'
      0x01:
        en: 'Yes'
        fr: 'Oui'

  CHECK_IN_PROGRESS: # CHECK_COURS and PRIORITE are here, maybe INTERD_PHASE_DEM also
    bits: '3.4'
    alt_names: ['CHECK_COURS']
    comment:
      en: 'Check in progress'
      fr: 'Check en cours'

  PRIORITY:
    bits: '3.3-3.0'
    alt_names: ['PRIORITE']
    comment:
      en: 'Message priority'
      fr: 'Priorite du message'
    type: 'uint4'
    offset: 0
    min: 0
    max: 14
    resolution: 1
    invalid:
    units:

  MESSAGE_ARGS:
    bits: '4.7-8.0'
    alt_names: ['PARAM_PTR']
    comment:
      en: 'Message arguments'
      fr: 'Parametres du message'
