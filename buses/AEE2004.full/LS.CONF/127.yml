id: 0x127
name: 'VTH_CONTROL'
alt_names: ['COMMANDE_VTH']
length: 2
type: 'can'
periodicity: ['100ms', 'trigger']
senders:
  - 'BSI'
receivers:
  - 'VTH'

signals:
  AUTOR_VTH:
    bits: '1.7'
    alt_names: ['AUTOR_VTH']
    comment:
      fr: 'Autorisation fonctionnement de la VTH'
      en: 'Authorization for HUV operation'
    values:
      0x00:
        fr: 'Non Autorisé'
        en: 'Not Authorized'
      0x01:
        fr: 'Autorisé'
        en: 'Authorized'

  SHOWROOM_VTH:
    bits: '1.6'
    alt_names: ['SHOWROOM_VTH']
    comment:
      fr: 'Mode showroom pour affichage VTH'
      en: 'Showroom mode for HUV display'
    values:
      0x00:
        fr: 'Showroom inactif'
        en: 'Showroom inactive'
      0x01:
        fr: 'Showroom actif'
        en: 'Showroom active'

  UNUSED_1:
    bits: '1.5-1.0'
    alt_names: ['LIBRE_1']
    unused: true

  LUMIN:
    bits: '2.7-2.0'
    alt_names: ['LUMIN']
    comment:
      fr: 'Niveau de luminosité'
      en: 'Brightness level'
    type: 'uint8'
    resolution: 1
    offset: 0
    min: 0
    max: 255
    invalid: 0xFF
    units: 'Lux'

  UNUSED_2:
    bits: '3.7-8.0'
    alt_names: ['LIBRE_2']
    unused: true