id: 0x1D7
name: 'BCD_STATUS'
alt_names: ['ETAT_BCD']
length: 1
comment:
  en: 'Contains BCD system information'
  fr: 'Contient des informations relatives au système BCD'
type: 'can'
periodicity: ['200ms', 'trigger']
senders:
  - 'BCD'
receivers:
  - 'CMB'
  - 'BSI'

signals:
  MAINTENANCE_RESET_REQUEST:
    alt_names: ['RAZM']
    bits: "1.7"
    comment:
      fr: "Raz maintenance demandée"
      en: "Maintenance reset request"
    values:
      0:
        fr: "Non demandée"
        en: "Not requested"
      1:
        fr: "Demandée"
        en: "Requested"

  AIRBAG_INHIBITION_STATUS:
    alt_names: ['IHM_INHIB']
    bits: "1.6-1.5"
    comment:
      fr: "Signalisation au client d'une inhibition airbag"
      en: "Airbag inhibition signaling to the client"
    values:
      0:
        fr: "Indéfini"
        en: "Undefined"
      1:
        fr: "Signalisation"
        en: "Signaling"
      2:
        fr: "Pas de signalisation"
        en: "No signaling"
      3:
        fr: "Défaut"
        en: "Fault"

  AIRBAG_FAULT_STATUS:
    alt_names: ['SIGNAL_DEF_AIRBAG']
    bits: "1.4-1.3"
    comment:
      fr: "Signalisation au client d'un défaut airbag"
      en: "Informing the client of an airbag defect"
    values:
      0:
        fr: "Indéfini"
        en: "Undefined"
      1:
        fr: "Signalisation"
        en: "Signaling"
      2:
        fr: "Pas de signalisation"
        en: "No signaling"
      3:
        fr: "Défaut"
        en: "Fault"

  RHEOSTAT_PUSH_STATUS:
    alt_names: ['PUSH_RHEO']
    bits: "1.2"
    comment:
      fr: "Push rhéostatage"
      en: "Rheostating push-button"
    values:
      0:
        fr: "Relâché"
        en: "Released"
      1:
        fr: "Appuyé"
        en: "Pressed"

  UNUSED_1:
    alt_names: ['LIBRE_1']
    bits: "1.1-1.0"
    unused: true