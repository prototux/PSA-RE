id: 0x0B6
name: 'BSI_FAST_DATA'
alt_names: ['DONNEES_BSI_RAPIDES']
length: 8
type: 'can'
periodicity: ['50ms']
senders:
  - 'BSI'
receivers:
  - 'CMB' # for speed and rpms
  - 'EMF'
  - 'RAD'
  - 'CMB'
  - 'VTH'
  - 'TO'
  - 'EDP_AV'
  - 'BDM'
  - 'AAS'
  - 'CLV'
  - 'EDP_AR'
  - 'BTEL'
  - 'CLR'
  - 'DEF'
  - 'PDS'
  - 'BCD'
  - 'TE'
  - 'STL'
  - 'CLIM_RFTA'
  - 'AAD'
  - 'BNB'
  - 'PLC'
  - 'KML'
  - 'AMPLI'
  - 'CMB_EMF'
  - 'BDMA'
  - 'SAM'
  - 'PDPC'
  - 'NG4'
  - 'MDS'
  - 'RNEG'
  - 'BTT'
  - 'MATT'
  - 'ICSV'
  - 'PASS_ICSV'

signals:
  ENGINE_SPEED:
    alt_names: ['VITM']
    bits: '1.7-2.0'
    comment:
      en: 'Engine speed'
      fr: 'Regime moteur'
    type: 'uint8'
    offset: 0
    min: 0
    max: 8191.75
    resolution: 0.125
    invalid: 0xFFFF
    units: 'rpm'

  CAR_SPEED:
    alt_names: ['VITV']
    bits: '3.7-4.0'
    comment:
      en: 'Car speed'
      fr: 'Vitesse voiture'
    type: 'uint8'
    offset: 0
    min: 0
    max: 655.34
    resolution: 0.01
    invalid: 0xFFFF
    units: 'km/h'

  TRAVEL_DISTANCE:
    alt_names: ['DIST']
    bits: '5.7-6.0'
    comment:
      en: 'Current trip distance'
      fr: 'Distance parcourue'
    type: 'uint16'
    offset: 0
    min: 0
    max: 6553.5
    resolution: 0.1
    invalid:
    units: 'm'

  FUEL_CONSUMPTION:
    alt_names: ['CONSO']
    bits: '7.7-7.0'
    comment:
      en: 'Current trip total fuel consumption'
      fr: 'Consommation de carburant'
    type: 'uint8'
    offset: 0
    min: 0
    max: 20400
    resolution: 80
    invalid:
    units: 'mm3'

  SECURISATION: # This contains SECU_VITV and SECU_VITESSE
    bits: '8.7'
    alt_names: ['SECU_VITV']
    comment:
      en: 'Speed security'
      fr: 'Securisation vitesse'
    values:
      0x00:
        en: 'Speed info invalid'
        fr: 'Information de vitesse invalide'
      0x01:
        en: 'Speed info valid'
        fr: 'Information de vitesse valide'

