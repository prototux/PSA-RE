id: 0x257
name: 'CMB_ODOMETER'
alt_names: ['KM_SAUV_CMB']
length: 6
comment:
  en: 'Odometer data from CMB'
  fr: 'Totaliseur kilometrique du CMB'
type: 'can'
periodicity: 'trigger'
senders:
  - 'CMB'
  - 'CMB_EMF'
receivers:
  - 'BSI'

signals:
  CMB_ODOMETER:
    bits: '1.7-3.0'
    alt_names: ['KM_SAUV']
    comment:
      en: 'Odometer value'
      fr: 'Totaliseur kilometrique'
    type: 'uint24'
    factor: 0.1
    min: 0
    max: 1677721.4
    units: 'km'
    values:
      0xFFFFFF:
        en: 'error'
        fr: 'erreur'

  SECURE:
    bits: '4.7-6.0'
    alt_names: ['SECURE']
    comment:
      en: 'Security status of the odometer value'
      fr: 'Etat de securite de la valeur du totaliseur kilometrique'


