id: 0x136
name: 'BSI_SLOW_DATA_2'
alt_names: ['DONNEES_BSI_LENTES_2']
length: 2
comment:
  en: 'Contains urea related information'
  fr: 'Contient des informations relatives à l''urée'
type: 'can'
periodicity: ['500ms']
senders:
  - 'BSI'
receivers:
  - 'MATT'
  - 'CMB'

signals:
  UREA_REMAINING_AUTONOMY:
    alt_names: ['AUTONOMIE_UREE']
    bits: "1.7-2.2"
    comment:
      fr: "Autonomie d'urée restante"
      en: "Remaining urea autonomy"
    type: uint16
    resolution: 1
    offset: 0
    min: 0
    max: 10000
    invalid: 16383
    units: "km"

  UREA_AUTONOMY_DISPLAY_REQUEST:
    alt_names: ['DMD_AFF_AUTON_UREE']
    bits: "2.1"
    comment:
      fr: "Demande affichage de l'autonomie d'urée dans le combiné"
      en: "Request display of the urea autonomy in cluster"
    values:
      0:
        fr: "Pas de demande"
        en: "No request"
      1:
        fr: "Demande"
        en: "Request"

  UNUSED_1:
    alt_names: ['LIBRE_1']
    bits: "2.0"
    unused: true