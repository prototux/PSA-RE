id: 0x165
name: 'RADIO_STATUS_GENERAL'
alt_names: ['ETAT_RADIO_GEN_GEN']
length: 4
comment:
  en: 'General status of the radio'
  fr: 'Etat general de la radio'
type: 'can'
periodicity: ['100ms']
senders:
  - 'ICSV'
  - 'PASS_ICSV'
  - 'RAD'
  - 'BTEL'
  - 'NG4'
  - 'RNEG'
  - 'BTT'

receivers:
  - 'BSI'
  - 'EMF'
  - 'KML'
  - 'AMPLI'
  - 'CMB_EMF'
  - 'MDS'
  - 'BTT'
  - 'MATT'
  - 'CDC'
  - 'PASS_ICSV'

signals:
  POWER:
    bits: '1.7'
    alt_names: ['POWER']
    comment:
      en: 'Radio power status'
      fr: 'Etat de la radio'
    values:
      0x00:
        en: 'Radio disabled'
        fr: 'Radio eteinte'
      0x01:
        en: 'Radio enabled'
        fr: 'Radio allumee'

  AMPLI_ON:
    bits: '1.6'
    alt_names: ['AMPLI_ON']
    comment:
      en: 'Amplifier status'
      fr: 'Etat de l''amplificateur'
    values:
      0x00:
        en: 'Amplified disabled'
        fr: 'Amplificateur eteint'
      0x01:
        en: 'Amplified enabled'
        fr: 'Amplificateur allume'

  MUTE:
    bits: '1.5'
    alt_names: ['MUTE_ACT']
    comment:
      en: 'Mute status'
      fr: 'Etat du mute'
    values:
      0x00:
        en: 'Not muted'
        fr: 'Non mute'
      0x01:
        en: 'Muted'
        fr: 'Mute'

  REJECT_POWER_ON_IN_ECO:
    bits: '1.4'
    alt_names: ['ON_REFUSE']
    comment:
      en: 'Power on rejected in ECO mode'
      fr: 'Allumage refuse en mode ECO'
    values:
      0x00:
        en: 'Power on not rejected'
        fr: 'Allumage non refuse'
      0x01:
        en: 'Power on rejected'
        fr: 'Allumage refuse'


  BI_TUNER:
    bits: '1.3'
    alt_names: ['BI_TUNER']
    comment:
      en: 'Bi-tuner status'
      fr: 'Etat du bi-tuner'
    values:
      0x00:
        en: 'No bi-tuner'
        fr: 'Pas de bi-tuner'
      0x01:
        en: 'Bi-tuner'
        fr: 'Bi-tuner'

  HIFI:
    bits: '1.2'
    alt_names: ['HI_FI']
    comment:
      en: 'Hi-fi status'
      fr: 'Etat du hi-fi'
    values:
      0x00:
        en: 'No hi-fi'
        fr: 'Pas de hi-fi'
      0x01:
        en: 'Hi-fi'
        fr: 'Hi-fi'

  DYNAMICS_COMPRESSION:
    bits: '1.1'
    alt_names: ['COMP_DYN']
    comment:
      en: 'Dynamic compression status'
      fr: 'Etat de la compression dynamique'
    values:
      0x00:
        en: 'No dynamic compression'
        fr: 'Pas de compression dynamique'
      0x01:
        en: 'Dynamic compression'
        fr: 'Compression dynamique'

  USB_SOURCE_TYPE:
    bits: '1.0'
    alt_names: ['TYPE_SRC_SEL_USB']
    comment:
      en: 'Type of USB source'
      fr: 'Type de source USB'
    values:
      0x00:
        en: 'USB'
        fr: 'USB'
      0x01:
        en: 'IPOD'
        fr: 'IPOD'

  TUN_SRC:
    bits: '2.7'
    alt_names: ['TUN_SRC']
    comment:
      en: 'Tuner source status'
      fr: 'Etat de la source du tuner'
    values:
      0x00:
        en: 'No tuner available'
        fr: 'Pas de tuner disponible'
      0x01:
        en: 'Tuner available'
        fr: 'Tuner disponible'

  CD_SRC:
    bits: '2.6-2.5'
    alt_names: ['CD_SRC']
    comment:
      en: 'Internal CD player source status'
      fr: 'Etat de la source du lecteur CD interne'
    values:
      0x00:
        en: 'No internal CD player'
        fr: 'Pas de lecteur CD interne'
      0x01:
        en: 'No disk available'
        fr: 'Pas de disque disponible'
      0x02:
        en: 'Player and disk available'
        fr: 'Lecteur et disque disponibles'

  CDC_SRC:
    bits: '2.4-2.3'
    alt_names: ['CDC_SRC']
    comment:
      en: 'CD changer source status'
      fr: 'Etat de la source du changeur CD'
    values:
      0x00:
        en: 'Not present'
        fr: 'Pas de changeur CD present'
      0x01:
        en: 'Available but not usable'
        fr: 'Disponible mais pas utilisable'
      0x02:
        en: 'Available and usable'
        fr: 'Disponible et utilisable'

  USB_SRC:
    bits: '2.2-2.1'
    alt_names: ['USB_SRC']
    comment:
      en: 'USB source status'
      fr: 'Etat de la source USB'
    values:
      0x00:
        en: 'Not present'
        fr: 'Pas de source USB presente'
      0x01:
        en: 'Available but not usable'
        fr: 'Disponible mais pas utilisable'
      0x02:
        en: 'Available and usable'
        fr: 'Disponible et utilisable'

  UNUSED_1:
    bits: '2.0'
    unused: true

  SRC_MIX:
    bits: '3.7'
    alt_names: ['SRC_MIX']
    comment:
      en: 'Mixed source status'
      fr: 'Etat de la source mixte'
    values:
      0x00:
        en: 'No mixed source'
        fr: 'Pas de source mixte'
      0x01:
        en: 'Mixed source'
        fr: 'Source mixte'

  SRC_SEL:
    bits: '3.6-3.4'
    alt_names: ['SRC_SEL']
    comment:
      en: 'Selected audio source'
      fr: 'Source audio selectionnee'
    values:
      0x00:
        en: 'None'
        fr: 'Aucune'
      0x01:
        en: 'Tuner'
        fr: 'Tuner'
      0x02:
        en: 'CD (internal)'
        fr: 'CD (interne)'
      0x03:
        en: 'CD changer'
        fr: 'Changeur CD'
      0x04:
        en: 'Aux 1'
        fr: 'Aux 1'
      0x05:
        en: 'Aux 2'
        fr: 'Aux 2'
      0x06:
        en: 'USB'
        fr: 'USB'
      0x07:
        en: 'Bluetooth'
        fr: 'Bluetooth'

  SRC_KML:
    bits: '3.3'
    alt_names: ['SOURCE_KML']
    comment:
      en: 'Switching to source with KML configuration '
      fr: 'Passage a une source avec configuration KML'
    values:
      0x00:
        en: 'No switching'
        fr: 'Pas de passage'
      0x01:
        en: 'Switching done'
        fr: 'Passage effectue'

  NO_SRC:
    bits: '3.2-3.0'
    alt_names: ['NO_SRC']
    comment:
      en: 'Audio source change rejected'
      fr: 'Rejet du changement de source audio'
    values:
      0x00:
        en: 'None'
        fr: 'Aucune'
      0x01:
        en: 'Tuner'
        fr: 'Tuner'
      0x02:
        en: 'CD (internal)'
        fr: 'CD (interne)'
      0x03:
        en: 'CD changer'
        fr: 'Changeur CD'
      0x04:
        en: 'Aux 1'
        fr: 'Aux 1'
      0x05:
        en: 'Aux 2'
        fr: 'Aux 2'
      0x06:
        en: 'USB'
        fr: 'USB'
      0x07:
        en: 'Bluetooth'
        fr: 'Bluetooth'

  CD_AUDIO_COMPRESSION:
    bits: '4.7-4.5'
    alt_names: ['FMT_COMP_AUDIO']
    comment:
      en: 'Audio compression format for CD sources'
      fr: 'Format de compression audio pour les sources CD'
    values:
      0x00:
        en: 'No CD or unknown format'
        fr: 'Pas de CD ou format inconnu'
      0x01:
        en: 'CD with MP3'
        fr: 'CD avec fichiers MP3'

  SUPPORTED_DIGITAL_RADIO:
    bits: '4.4-4.2'
    alt_names: ['RADIO_NUM']
    comment:
      en: 'Supported digital radio formats'
      fr: 'Formats de radio numerique supportes'
    values:
      0x00:
        en: 'No digital radio supported'
        fr: 'Pas de radio numerique supportee'
      0x01:
        en: 'DAB supported'
        fr: 'DAB supporte'
      0x02:
        en: 'DVBT supported'
        fr: 'DVBT supporte'

  BT_SRC:
    bits: '4.1-4.0'
    alt_names: ['BT_SRC']
    comment:
      en: 'Bluetooth source status'
      fr: 'Etat de la source Bluetooth'
    values:
      0x00:
        en: 'Not present'
        fr: 'Pas de source Bluetooth presente'
      0x01:
        en: 'Available but not usable'
        fr: 'Disponible mais pas utilisable'
      0x02:
        en: 'Available and usable'
        fr: 'Disponible et utilisable'
