id: 0x221
name: 'TRIP_GENERAL_INFOS'
alt_names: ['INFOS_GEN_ODB']
length: 7
type: 'can'
periodicity: ['1000ms']
senders:
  - 'BSI'
receivers:
  - 'EMF'
  - 'CMB'
  - 'CMB_EMF'
  - 'RAD'
  - 'MATT'
  - 'BGP'
  - 'NG4'
  - 'BTEL'
  - 'BCD'
  - 'PASS ICSV'
  - 'KML'
  - 'MDS'

signals:
  CHECK_CONSUMPTION:
    bits: '1.7'
    alt_names: ['CONSO_ODB']
    comment:
      en: 'Consumption data check'
      fr: 'Verification donnees consommation'
    values:
      0x00:
        en: 'Valid data'
        fr: 'Donnees valides'
      0x01:
        en: 'Invalid data'
        fr: 'Donnees invalides'

  CHECK_AUTONOMY:
    bits: '1.6'
    alt_names: ['AUTON_ODB']
    comment:
      en: 'Autonomy data check'
      fr: 'Verifications donnees autonomie'
    values:
      0x00:
        en: 'Valid data'
        fr: 'Donnees valides'
      0x01:
        en: 'Invalid data'
        fr: 'Donnees invalides'

  UNUSED_1:
    bits: '1.5-1.4'
    unused: true

  TRIP_PUSH_BUTTON:
    bits: '1.3'
    alt_names: ['POUSSOIR_ODB']
    comment:
      en: 'Trip (right) push button'
      fr: 'Bouton poussoir ODB (droit)'
    values:
      0x00:
        en: 'Not pushed'
        fr: 'Non appuye'
      0x01:
        en: 'Pushed'
        fr: 'Appuye'

  UNUSED_2:
    bits: '1.2-1.1'
    unused: true

  NAVIGATION_PUSH_BUTTON:
    bits: '1.0'
    alt_names: ['POUSSOIR_NAV']
    comment:
      en: 'Navigation (left) push button'
      fr: 'Bouton poussoir navigation (gauche)'
    values:
      0x00:
        en: 'Not pushed'
        fr: 'Non appuye'
      0x01:
        en: 'Pushed'
        fr: 'Appuye'

  INSTANT_CONSUMPTION:
    bits: '2.7-3.0'
    alt_names: ['CONSO_INSTANTANEE']
    comment:
      en: 'Instant consumption'
      fr: 'Consommation instantanee carburant'
    type: 'uint16'
    offset: 0
    min: 0
    max: 30
    resolution: 0.1
    invalid: 0xFFFF
    units: 'l/100km'

  AUTONOMY:
    bits: '4.7-5.0'
    alt_names: ['AUTONOMIE']
    comment:
      en: 'Autonomy with current fuel'
      fr: 'Autonomie avec le carburant actuel'
    type: 'uint16'
    offset: 0
    min: 0
    max: 2000
    resolution: 1
    invalid: 0xFFFF
    units: 'km'

  TRIP_DIST_LEFT:
    bits: '6.7-7.0'
    alt_names: ['KM_RESTANT']
    comment:
      en: 'Distance left on current trip'
      fr: 'Distance a parcourir trajet en cours'
    type: 'uint16'
    offset: 0
    min: 0
    max: 6000
    resolution: 0.1
    invalid: 0xFFFF
    units: 'km'