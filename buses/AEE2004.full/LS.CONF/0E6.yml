id: 0x0E6
name: 'BRAKE_ABR_STATUS'
alt_names: ['IS_DAT_ABR']
length: 7
type: 'can'
periodicity: ['100ms']
senders:
  - 'PASS_BSI'
receivers:
  - 'BSI'
  - 'AAS'
  - 'DEF'
  - 'SAM'
  - 'NG4'
  - 'RNEG'
  - 'BTT'
  - 'BTEL'
  - 'MDS'

signals:
  REF_FAULT_LAMP:
    bits: '1.7'
    alt_names: ['REQ_LAMPE_DEF_REF']
    comment:
      fr: 'Demande allumage lampe défaut REF'
      en: 'Request for REF default lamp turning on'
    values:
      0x00:
        fr: 'Lampe éteinte'
        en: 'Lamp off'
      0x01:
        fr: 'Lampe allumée'
        en: 'Lamp on'

  ABS_FAULT:
    bits: '1.6'
    alt_names: ['DEFAUT_ABR']
    comment:
      fr: 'Défaut ABR'
      en: 'ABR fault'
    values:
      0x00:
        fr: 'ABS OK'
        en: 'ABS OK'
      0x01:
        fr: 'ABS en défaut'
        en: 'ABS fault'

  ABS_IN_PROGRESS:
    bits: '1.5'
    alt_names: ['REGUL_ABR']
    comment:
      fr: 'ABR en régulation'
      en: 'ABR in regulation'
    values:
      0x00:
        fr: 'Non en régulation'
        en: 'Not in regulation'
      0x01:
        fr: 'En régulation'
        en: 'In regulation'

  AUTOMATIC_HAZARD_LIGHTS_BY_UC_BRAKE:
    bits: '1.4'
    alt_names: ['FNCT_AAFD_UC_FREIN']
    comment:
      fr: 'Déclare que la fonction allumage automatique des feux de détresse est implémentée dans l''UC Frein'
      en: 'Declares that the automatic lighting of hazard warning lights is implemented in the UC Brake'
    values:
      0x00:
        fr: 'Fonction AAFD non présente dans l''UC Frein'
        en: 'AAFD function not present in UC Brake'
      0x01:
        fr: 'Fonction AAFD présente dans l''UC Frein'
        en: 'AAFD function present in UC Brake'

  REF_IN_PROGRESS:
    bits: '1.3'
    alt_names: ['REGUL_REF']
    comment:
      fr: 'REF en régulation'
      en: 'REF in regulation'
    values:
      0x00:
        fr: 'Non en régulation'
        en: 'Not in regulation'
      0x01:
        fr: 'En régulation'
        en: 'In regulation'

  WORN_BRAKE_PADS_INDICATOR:
    bits: '1.2'
    alt_names: ['USURE_PLAQ_FREIN']
    comment:
      fr: 'Usure plaquettes de frein'
      en: 'Worn brake disk pads'
    values:
      0x00:
        fr: 'Plaquettes de frein en état'
        en: 'Brake pads in good condition'
      0x01:
        fr: 'Plaquettes de frein usées'
        en: 'Brake pads worn'

  BRAKE_FLUID_LEVEL_ALERT:
    bits: '1.1'
    alt_names: ['ALRT_LIQU_FREIN']
    comment:
      fr: 'Alerte niveau liquide de frein'
      en: 'Brake fluid level alert'
    values:
      0x00:
        fr: 'Pas d''alerte'
        en: 'No alert'
      0x01:
        fr: 'Alerte'
        en: 'Alert'

  ABS_FAULT_LAMP_REQUEST:
    bits: '1.0'
    alt_names: ['REQ_LAMPE_DEF_ABR']
    comment:
      fr: 'Demande allumage lampe défaut ABR'
      en: 'Request for ABS default lamp turning on'
    values:
      0x00:
        fr: 'Lampe éteinte'
        en: 'Lamp off'
      0x01:
        fr: 'Lampe allumée'
        en: 'Lamp on'

  REAR_LEFT_WHEEL_SPEED_SENSOR_FAULT:
    bits: '2.7'
    alt_names: ['DEFAUT_CMPT_TOPS_ARG']
    comment:
      fr: 'Défaut Compteur de tops ARG'
      en: 'Rear left wheel speed sensor fault'
    values:
      0x00:
        fr: 'Pas de défaut compteur de tops ARG'
        en: 'No fault present'
      0x01:
        fr: 'Défaut compteur de tops ARG'
        en: 'Fault present'

  REAR_LEFT_WHEEL_SPIN_COUNTER:
    bits: '2.6-3.0'
    alt_names: ['CPT_TOP_ARG']
    comment:
      fr: 'Compteur en free running : 1 top équivaut à 1 incrément de bit'
      en: 'Counter in free running: 1 top is equivalent to 1 bit increment'
    type: 'uint16'
    resolution: 1
    offset: 0
    min: 0
    max: 32767
    invalid:

  REAR_RIGHT_WHEEL_SPEED_SENSOR_FAULT:
    bits: '4.7'
    alt_names: ['DEFAUT_CMPT_TOPS_ARD']
    comment:
      fr: 'Défaut Compteur de tops ARD'
      en: 'Rear right wheel speed sensor fault'
    values:
      0x00:
        fr: 'Pas de défaut compteur de tops ARD'
        en: 'No fault present'
      0x01:
        fr: 'Défaut compteur de tops ARD'
        en: 'Fault present'

  REAR_RIGHT_WHEEL_SPIN_COUNTER:
    bits: '4.6-5.0'
    alt_names: ['CPT_TOP_ARD']
    comment:
      fr: 'Compteur en free running : 1 top équivaut à 1 incrément de bit'
      en: 'Counter in free running: 1 top is equivalent to 1 bit increment'
    type: 'uint16'
    resolution: 1
    offset: 0
    min: 0
    max: 32767
    invalid:

  BATTERY_VOLTAGE_UC_BRAKE:
    bits: '6.7-6.0'
    alt_names: ['TENSION_BATTERIE_UCFREIN']
    comment:
      fr: 'Tension batterie mesurée par l''UC Frein'
      en: 'Battery voltage measured by the UC Brake'
    type: 'uint8'
    resolution: 0.05
    offset: 7
    min: 7
    max: 18.5
    invalid: 0xFF
    units: 'V'

  EMERGENCY_BRAKING_SIGNALIZATION_BY_UC_BRAKE:
    bits: '7.7'
    alt_names: ['FNCT_SFU_UC_FREIN']
    comment:
      fr: 'Déclare que la fonction Signalisation Freinage d''Urgence est implémentée dans l''UC Frein'
      en: 'Declares that the Emergency Braking Signalization is implemented in the UC brake'
    values:
      0x00:
        fr: 'Fonction SFU non présente dans l''UC Frein'
        en: 'SFU function not present in UC Brake'
      0x01:
        fr: 'Fonction SFU présente dans l''UC Frein'
        en: 'SFU function present in UC Brake'

  BRAKE_FUNCTION_NEED_FOR_START_STOP:
    bits: '7.5-7.4'
    alt_names: ['BES_FREIN_STT']
    comment:
      fr: 'Besoin fonction frein pour STT'
      en: 'Brake function need for STT'
    values:
      0x00:
        fr: 'Pas de besoin par fonction frein'
        en: 'No need by brake function'
      0x01:
        fr: 'Inhibition de passage en stop'
        en: 'Stop transition inhibition'
      0x02:
        fr: 'Demande de redémarrage'
        en: 'Restart request'
      0x03:
        fr: 'Inhibition de passage en Stop et de redémarrage'
        en: 'Stop transition and restart inhibition'

  UNUSED_1:
    bits: '7.3-7.0'
    alt_names: ['LIBRE_1']
    comment:
      fr: 'Bits libres'
      en: 'Free bits'
    unused: true