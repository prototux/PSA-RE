      en: "Evolution of restart request of automatic headlights fault alert (bit toggle)"

  RESTART_SPACE_SIZE_MESSAGE:
    alt_names: ['RELANCE_TAILLE_PLACE']
    bits: "2.1"
    comment:
      fr: "Evolution de la demande de relance du message de taille de place (bit toggle)"
      en: "Evolution of restart request of the space size message (bit toggle)"

  RESTART_RELEASED_PARKING_BRAKE_ALERT:
    alt_names: ['RELANCE_FREIN_DESSERRE']
    bits: "2.0"
    comment:
