id: 0x1A7
name: 'RESTART_ALERTS'
alt_names: ['RELANCE_ALERTES']
length: 4
comment:
  en: 'Contains restart alerts information'
  fr: 'Contient des informations relatives aux alertes de relance'
type: 'can'
periodicity: ['1000ms', 'trigger']
senders:
  - 'BSI'
receivers:
  - 'CMB'

signals:
  RESTART_ESP_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_ESP']
    bits: "1.7"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut ESP (bit toggle)"
      en: "Evolution of restart request of ESP fault alert (bit toggle)"

  RESTART_LVV_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_LVV']
    bits: "1.6"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut LVV (bit toggle)"
      en: "Evolution of restart request of LVV fault alert (bit toggle)"

  RESTART_RVV_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_RVV']
    bits: "1.5"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut RVV (bit toggle)"
      en: "Evolution of restart request of RVV fault alert (bit toggle)"

  RESTART_STL_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_STL']
    bits: "1.4"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut STL (bit toggle)"
      en: "Evolution of restart request of STL fault alert (bit toggle)"

  RESTART_STT_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_STT']
    bits: "1.3"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut STT (bit toggle)"
      en: "Evolution of restart request of STT fault alert (bit toggle)"

  RESTART_SAM_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_SAM']
    bits: "1.2"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut SAM (bit toggle)"
      en: "Evolution of restart request of blind spot fault alert (bit toggle)"

  RESTART_PLC_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_PLC']
    bits: "1.1"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut PLC (bit toggle)"
      en: "Evolution of restart request of PLC fault alert (bit toggle)"

  RESTART_DOP_FAULT_ALERT:
    alt_names: ['RELANCE_DEFAUT_DOP']
    bits: "1.0"
    comment:
      fr: "Evolution de la demande de relance de l'alerte défaut DOP (bit toggle)"
      en: "Evolution of restart request of DOP fault alert (bit toggle)"

  RESTART_LOW_WASHER_FLUID_ALERT:
