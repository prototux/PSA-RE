    alt_names: ['RELANCE_BIP_LOCK']
    bits: "2.6"
    comment:
      fr: "Evolution de la demande de relance \"bip lock\" (bit toggle)"
      en: "Evolution of \"beep lock\" restart request (bit toggle)"

  RESTART_APPLIED_PARKING_BRAKE_ALERT:
    alt_names: ['RELANCE_FREIN_SERRE']
    bits: "2.5"
    comment:
      fr: "Evolution de la demande de relance de l'alerte frein de stationnement serré (bit toggle)"
      en: "Evolution of restart request of applied parking brake alert (bit toggle)"

  RESTART_SUSPENSION_POSITION_ALERT:
    alt_names: ['RELANCE_POS_SUSPENSION']
    bits: "2.4"
    comment:
      fr: "Evolution de la demande de relance de l'alerte position de suspension déjà obtenue (bit toggle)"
      en: "Evolution of restart request of already obtained suspension position fault alert (bit toggle)"

  RESTART_PUSH_FSE:
    alt_names: ['RELANCE_PUSH_FSE']
